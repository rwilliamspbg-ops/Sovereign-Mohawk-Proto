repos:
  # Standard file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
        exclude: '^(.*\.pb2\.py|proofs/.*\.md)$'
      - id: end-of-file-fixer
        exclude: '^(.*\.pb2\.py)$'
      - id: check-yaml
        args: ['--safe']
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-case-conflict
      - id: check-toml
      - id: check-xml

  # Go linting
  - repo: https://github.com/golangci/golangci-lint
    rev: v1.54.0
    hooks:
      - id: golangci-lint
        args: ['--timeout=5m']

  # Go fmt
  - repo: https://github.com/pre-commit/mirrors-gofmt
    rev: v1.20.1
    hooks:
      - id: gofmt-repo
        exclude: '^proofs/.*'

  # Python formatting and linting
  - repo: https://github.com/psf/black
    rev: 23.3.0
    hooks:
      - id: black
        language_version: python3.11
        exclude: '^(sdk/python/tests/fixtures|.*\.pb2\.py)$'

  - repo: https://github.com/PyCQA/isort
    rev: 5.12.0
    hooks:
      - id: isort
        language_version: python3.11

  - repo: https://github.com/PyCQA/flake8
    rev: 6.0.0
    hooks:
      - id: flake8
        args: ['--max-line-length=120', '--extend-ignore=E203,W503']
        exclude: '^(sdk/python/tests/fixtures|.*\.pb2\.py)$'

  # Security checks
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        args: ['-ll']  # Only report HIGH and CRITICAL
        exclude: '^(tests/|sdk/python/tests/)'

  # YAML validation
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.32.0
    hooks:
      - id: yamllint
        args: ['-d', '{rules: {line-length: {max: 120}, indentation: {spaces: 2}}}']

  # Dockerfile linting
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker
        name: hadolint
        exclude: '^proofs/.*'

  # Conventional commits
  - repo: https://github.com/commitizen-tools/commitizen
    rev: 3.5.3
    hooks:
      - id: commitizen
        stages: [commit-msg]

  # Markdown linting
  - repo: https://github.com/executablebooks/mdformat
    rev: 0.7.16
    hooks:
      - id: mdformat
        additional_dependencies: ['mdformat-gfm', 'mdformat-tables']
        exclude: '^(CHANGELOG|README|WHITE_PAPER|ACADEMIC_PAPER)\.md$'

# Configuration for pre-commit
default_stages: [commit, push]
fail_fast: false
minimum_pre_commit_version: 2.15.0
