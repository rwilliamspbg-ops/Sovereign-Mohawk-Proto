services:
  runtime-secrets-init:
    image: alpine:3.21
    container_name: runtime-secrets-init
    environment:
      - MOHAWK_TPM_CLIENT_CERT_POOL_SIZE=${MOHAWK_TPM_CLIENT_CERT_POOL_SIZE:-128}
    command:
      - /bin/sh
      - -lc
      - |
        set -e
        apk add --no-cache openssl >/dev/null
        mkdir -p /run/secrets
        for p in \
          /run/secrets/mohawk_api_token \
          /run/secrets/mohawk_tpm_ca_cert.pem \
          /run/secrets/mohawk_tpm_ca_key.pem \
          /run/secrets/mohawk_tpm_orchestrator_cert.pem \
          /run/secrets/mohawk_tpm_orchestrator_key.pem \
          /run/secrets/mohawk_tpm_client_cert.pem \
          /run/secrets/mohawk_tpm_client_key.pem; do
          if [ -d "$$p" ]; then
            if [ -z "$(ls -A "$$p" 2>/dev/null)" ]; then
              rmdir "$$p"
              echo "warning: removed empty directory placeholder at $$p" >&2
            else
              echo "error: expected file but found non-empty directory at $$p" >&2
              echo "hint: inspect and remove/rename the directory, then re-run compose (for example: rm -rf $$p)" >&2
              exit 1
            fi
          fi
        done
        if [ ! -s /run/secrets/mohawk_api_token ]; then
          umask 077
          openssl rand -hex 24 > /run/secrets/mohawk_api_token
        fi
        if [ ! -s /run/secrets/mohawk_tpm_ca_cert.pem ] || [ ! -s /run/secrets/mohawk_tpm_ca_key.pem ]; then
          openssl req -x509 -newkey rsa:3072 \
            -keyout /run/secrets/mohawk_tpm_ca_key.pem \
            -out /run/secrets/mohawk_tpm_ca_cert.pem \
            -sha256 -days 365 -nodes \
            -subj "/CN=Sovereign-Mohawk TPM Root/O=Sovereign-Mohawk" >/dev/null 2>&1
        fi
        issue_leaf() {
          cn="$$1"
          cert="$$2"
          key="$$3"
          san="$${4:-}"
          csr="$${cert}.csr"
          ext="$${cert}.ext"
          regen=false
          if [ -d "$$cert" ] || [ -d "$$key" ]; then
            for path in "$$cert" "$$key"; do
              if [ -d "$$path" ]; then
                if [ -z "$(ls -A "$$path" 2>/dev/null)" ]; then
                  rmdir "$$path"
                  echo "warning: removed empty directory placeholder at $$path" >&2
                else
                  echo "error: expected file but found non-empty directory at $$path" >&2
                  exit 1
                fi
              fi
            done
          fi
          if [ -s "$$cert" ] && [ -n "$$san" ]; then
            if ! openssl x509 -in "$$cert" -noout -text | grep -q "Subject Alternative Name"; then
              regen=true
            fi
          fi
          if [ ! -s "$$cert" ] || [ ! -s "$$key" ] || [ "$$regen" = true ]; then
            openssl req -new -newkey rsa:3072 -nodes \
              -keyout "$$key" \
              -out "$$csr" \
              -subj "/CN=$${cn}/O=Sovereign-Mohawk Nodes" >/dev/null 2>&1
            if [ -n "$$san" ]; then
              printf 'subjectAltName=%s\nextendedKeyUsage=serverAuth,clientAuth\n' "$$san" > "$$ext"
            fi
            openssl x509 -req \
              -in "$$csr" \
              -CA /run/secrets/mohawk_tpm_ca_cert.pem \
              -CAkey /run/secrets/mohawk_tpm_ca_key.pem \
              -CAcreateserial \
              -out "$$cert" \
              -days 30 \
              -sha256 \
              $${san:+-extfile "$$ext"} >/dev/null 2>&1
            rm -f "$$csr" "$$ext"
            chmod 600 "$$cert" "$$key"
          fi
        }
        issue_leaf orchestrator /run/secrets/mohawk_tpm_orchestrator_cert.pem /run/secrets/mohawk_tpm_orchestrator_key.pem "DNS:orchestrator,DNS:localhost,IP:127.0.0.1"
        issue_leaf node-agent /run/secrets/mohawk_tpm_client_cert.pem /run/secrets/mohawk_tpm_client_key.pem
        mkdir -p /run/secrets/node-agent-certs
        pool_size="$${MOHAWK_TPM_CLIENT_CERT_POOL_SIZE:-128}"
        case "$$pool_size" in
          ''|*[!0-9]*) pool_size=128 ;;
        esac
        if [ "$$pool_size" -lt 1 ]; then
          pool_size=1
        fi
        i=1
        while [ "$$i" -le "$$pool_size" ]; do
          issue_leaf "node-agent-$${i}" \
            "/run/secrets/node-agent-certs/mohawk_tpm_client_$${i}_cert.pem" \
            "/run/secrets/node-agent-certs/mohawk_tpm_client_$${i}_key.pem"
          i=$$((i+1))
        done
    volumes:
      - ./runtime-secrets:/run/secrets
    networks:
      - mohawk-net
    restart: "no"

  orchestrator:
    build:
      context: .
      dockerfile: cmd/orchestrator/Dockerfile
    container_name: orchestrator
    ports:
      - "8080:8080"
      - "4101:4101"
      - "4101:4101/udp"
    environment:
      - IPFS_API_ENDPOINT=http://ipfs:5001
      - MOHAWK_LIBP2P_PORT=4101
      - MOHAWK_TRANSPORT_KEX_MODE=${MOHAWK_TRANSPORT_KEX_MODE:-x25519-mlkem768-hybrid}
      - MOHAWK_DISABLE_QUIC=true
      - MOHAWK_TPM_IDENTITY_SIG_MODE=${MOHAWK_TPM_IDENTITY_SIG_MODE:-xmss}
      - MOHAWK_TPM_CA_CERT_FILE=/run/secrets/mohawk_tpm_ca_cert.pem
      - MOHAWK_TPM_CERT_FILE=/run/secrets/mohawk_tpm_orchestrator_cert.pem
      - MOHAWK_TPM_KEY_FILE=/run/secrets/mohawk_tpm_orchestrator_key.pem
      - MOHAWK_ADMIN_TOKEN_FILE=/run/secrets/mohawk_api_token
      - MOHAWK_PQC_MIGRATION_ENABLED=${MOHAWK_PQC_MIGRATION_ENABLED:-true}
      - MOHAWK_PQC_LOCK_LEGACY_TRANSFERS=${MOHAWK_PQC_LOCK_LEGACY_TRANSFERS:-true}
      - MOHAWK_PQC_MIGRATION_ETA=${MOHAWK_PQC_MIGRATION_ETA:-2027-12-31T00:00:00Z}
      - MOHAWK_PQC_MIGRATION_EPOCH=${MOHAWK_PQC_MIGRATION_EPOCH:-2027-12-31T00:00:00Z}
      - MOHAWK_PQC_REQUIRE_CRYPTO_AFTER_EPOCH=${MOHAWK_PQC_REQUIRE_CRYPTO_AFTER_EPOCH:-true}
      - MOHAWK_LEDGER_STATE_PATH=/var/lib/mohawk/utility-ledger/state.json
      - MOHAWK_LEDGER_AUDIT_PATH=/var/lib/mohawk/utility-ledger/audit.jsonl
      - MOHAWK_API_AUTH_MODE=file-only
      - MOHAWK_API_TOKEN_FILE=/run/secrets/mohawk_api_token
      - MOHAWK_API_ENFORCE_ROLES=true
      - MOHAWK_API_BRIDGE_ALLOWED_ROLES=bridge,admin
      - MOHAWK_API_HYBRID_ALLOWED_ROLES=verifier,admin
      - MOHAWK_UTILITY_RATE_LIMIT_PER_MIN=240
      - MOHAWK_UTILITY_ENFORCE_ROLES=true
      - MOHAWK_UTILITY_MINT_ALLOWED_ROLES=minter,admin
      - MOHAWK_UTILITY_TRANSFER_ALLOWED_ROLES=user,operator,admin
      - MOHAWK_UTILITY_BACKUP_ALLOWED_ROLES=operator,admin
      - MOHAWK_UTILITY_RESTORE_ALLOWED_ROLES=admin
    volumes:
      - ./data/utility-ledger:/var/lib/mohawk/utility-ledger
      - ./runtime-secrets/mohawk_api_token:/run/secrets/mohawk_api_token:ro
      - ./runtime-secrets/mohawk_tpm_ca_cert.pem:/run/secrets/mohawk_tpm_ca_cert.pem:ro
      - ./runtime-secrets/mohawk_tpm_orchestrator_cert.pem:/run/secrets/mohawk_tpm_orchestrator_cert.pem:ro
      - ./runtime-secrets/mohawk_tpm_orchestrator_key.pem:/run/secrets/mohawk_tpm_orchestrator_key.pem:ro
    depends_on:
      runtime-secrets-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2g
        reservations:
          cpus: '1'
          memory: 1g
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:9091/metrics >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - mohawk-net

  tpm-metrics:
    image: golang:1.26-alpine3.21
    container_name: tpm-metrics
    working_dir: /workspace
    command: ["go", "run", "./cmd/tpm-metrics"]
    environment:
      - GOTOOLCHAIN=auto
    volumes:
      - .:/workspace
    ports:
      - "9102:9102"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1g
        reservations:
          cpus: '0.5'
          memory: 512m
    restart: unless-stopped
    networks:
      - mohawk-net

  pyapi-metrics-exporter:
    image: golang:1.26-alpine3.21
    container_name: pyapi-metrics-exporter
    working_dir: /workspace
    command: ["go", "run", "./cmd/pyapi-metrics-exporter"]
    environment:
      - GOTOOLCHAIN=auto
      - MOHAWK_PYAPI_TRAFFIC_INTERVAL_SECONDS=10
      - MOHAWK_PYAPI_EXPORTER_PORT=9104
    volumes:
      - .:/workspace
    ports:
      - "9104:9104"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1g
        reservations:
          cpus: '0.5'
          memory: 512m
    restart: unless-stopped
    networks:
      - mohawk-net

  federated-router:
    image: golang:1.26-alpine3.21
    container_name: federated-router
    working_dir: /workspace
    command: ["go", "run", "./cmd/federated-router"]
    environment:
      - GOTOOLCHAIN=auto
      - MOHAWK_ROUTER_ADDR=:8087
      - MOHAWK_ROUTER_METRICS_ADDR=:8088
      - MOHAWK_ROUTER_ALLOWED_ROUTES=climate->agriculture,climate->supply-chain,oncology->supply-chain
      - MOHAWK_ROUTER_PROVENANCE_PATH=/var/lib/mohawk/router/provenance.json
      - MOHAWK_ROUTER_ALLOW_INSECURE_DEV_QUOTES=${MOHAWK_ROUTER_ALLOW_INSECURE_DEV_QUOTES:-true}
      - MOHAWK_TPM_CA_CERT_FILE=/run/secrets/mohawk_tpm_ca_cert.pem
    volumes:
      - .:/workspace
      - ./data/router:/var/lib/mohawk/router
      - ./runtime-secrets/mohawk_tpm_ca_cert.pem:/run/secrets/mohawk_tpm_ca_cert.pem:ro
    depends_on:
      runtime-secrets-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1536m
        reservations:
          cpus: '0.75'
          memory: 768m
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8088/metrics >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    ports:
      - "8087:8087"
    networks:
      - mohawk-net

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/recording-rules.yml:/etc/prometheus/recording-rules.yml:ro
      - ./monitoring/prometheus/alerting-rules.yml:/etc/prometheus/alerting-rules.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - alertmanager
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1536m
        reservations:
          cpus: '0.5'
          memory: 768m
    restart: unless-stopped
    networks:
      - mohawk-net

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    command: ["--config.file=/etc/alertmanager/alertmanager.yml"]
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    ports:
      - "9093:9093"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512m
        reservations:
          cpus: '0.25'
          memory: 256m
    restart: unless-stopped
    networks:
      - mohawk-net

  grafana:
    image: grafana/grafana:11.5.2
    container_name: grafana
    environment:
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_LOG_FILTERS=dashboard-service:warn live:warn
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1g
        reservations:
          cpus: '0.5'
          memory: 512m
    restart: unless-stopped
    networks:
      - mohawk-net

  ipfs:
    image: ipfs/kubo:v0.28.0
    container_name: ipfs
    ports:
      - "5001:5001"
    volumes:
      - ipfs-data:/data/ipfs
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2g
        reservations:
          cpus: '1'
          memory: 1g
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ipfs", "id"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - mohawk-net

  shard-us-east:
    build:
      context: .
      dockerfile: cmd/orchestrator/Dockerfile
    container_name: shard-us-east
    command: ["./main"]
    depends_on:
      orchestrator:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1536m
        reservations:
          cpus: '0.75'
          memory: 768m
    restart: unless-stopped
    networks:
      - mohawk-net

  shard-eu-west:
    build:
      context: .
      dockerfile: cmd/orchestrator/Dockerfile
    container_name: shard-eu-west
    command: ["./main"]
    depends_on:
      orchestrator:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1536m
        reservations:
          cpus: '0.75'
          memory: 768m
    restart: unless-stopped
    networks:
      - mohawk-net

  node-agent-1:
    build:
      context: .
      dockerfile: cmd/node-agent/Dockerfile
    container_name: node-agent-1
    environment:
      - ORCHESTRATOR_URL=https://orchestrator:8080
      - ORCHESTRATOR_SERVER_NAME=orchestrator
      - NODE_ID=node-1
      - IPFS_API_ENDPOINT=http://ipfs:5001
      - MOHAWK_LIBP2P_PORT=4001
      - MOHAWK_TRANSPORT_KEX_MODE=${MOHAWK_TRANSPORT_KEX_MODE:-x25519-mlkem768-hybrid}
      - MOHAWK_DISABLE_QUIC=true
      - MOHAWK_TPM_IDENTITY_SIG_MODE=${MOHAWK_TPM_IDENTITY_SIG_MODE:-xmss}
      - MOHAWK_TPM_CA_CERT_FILE=/run/secrets/mohawk_tpm_ca_cert.pem
      - MOHAWK_TPM_CERT_FILE=/run/secrets/mohawk_tpm_node_cert.pem
      - MOHAWK_TPM_KEY_FILE=/run/secrets/mohawk_tpm_node_key.pem
      - MOHAWK_ALLOW_INSECURE_WASM_FALLBACK=false
      - MOHAWK_ROUTER_URL=http://federated-router:8087
      - MOHAWK_ROUTER_SOURCE_VERTICAL=climate
      - MOHAWK_ROUTER_TARGET_VERTICAL=supply-chain
      - MOHAWK_ROUTER_MODEL_ID=node-agent-climate-insight
      - MOHAWK_API_AUTH_MODE=file-only
      - MOHAWK_API_TOKEN_FILE=/run/secrets/mohawk_api_token
      - MOHAWK_API_ENFORCE_ROLES=true
      - MOHAWK_API_BRIDGE_ALLOWED_ROLES=bridge,admin
      - MOHAWK_API_HYBRID_ALLOWED_ROLES=verifier,admin
      - MOHAWK_UTILITY_RATE_LIMIT_PER_MIN=240
      - MOHAWK_UTILITY_ENFORCE_ROLES=true
      - MOHAWK_UTILITY_MINT_ALLOWED_ROLES=minter,admin
      - MOHAWK_UTILITY_TRANSFER_ALLOWED_ROLES=user,operator,admin
      - MOHAWK_UTILITY_BACKUP_ALLOWED_ROLES=operator,admin
      - MOHAWK_UTILITY_RESTORE_ALLOWED_ROLES=admin
    volumes:
      - ./runtime-secrets/mohawk_api_token:/run/secrets/mohawk_api_token:ro
      - ./runtime-secrets/mohawk_tpm_ca_cert.pem:/run/secrets/mohawk_tpm_ca_cert.pem:ro
      - ./runtime-secrets/mohawk_tpm_client_cert.pem:/run/secrets/mohawk_tpm_node_cert.pem:ro
      - ./runtime-secrets/mohawk_tpm_client_key.pem:/run/secrets/mohawk_tpm_node_key.pem:ro
    depends_on:
      orchestrator:
        condition: service_healthy
      runtime-secrets-init:
        condition: service_completed_successfully
      ipfs:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1536m
        reservations:
          cpus: '0.75'
          memory: 768m
    restart: unless-stopped
    networks:
      - mohawk-net

  node-agent-2:
    build:
      context: .
      dockerfile: cmd/node-agent/Dockerfile
    container_name: node-agent-2
    environment:
      - ORCHESTRATOR_URL=https://orchestrator:8080
      - ORCHESTRATOR_SERVER_NAME=orchestrator
      - NODE_ID=node-2
      - IPFS_API_ENDPOINT=http://ipfs:5001
      - MOHAWK_LIBP2P_PORT=4002
      - MOHAWK_TRANSPORT_KEX_MODE=${MOHAWK_TRANSPORT_KEX_MODE:-x25519-mlkem768-hybrid}
      - MOHAWK_DISABLE_QUIC=true
      - MOHAWK_TPM_IDENTITY_SIG_MODE=${MOHAWK_TPM_IDENTITY_SIG_MODE:-xmss}
      - MOHAWK_TPM_CA_CERT_FILE=/run/secrets/mohawk_tpm_ca_cert.pem
      - MOHAWK_TPM_CERT_FILE=/run/secrets/mohawk_tpm_node_cert.pem
      - MOHAWK_TPM_KEY_FILE=/run/secrets/mohawk_tpm_node_key.pem
      - MOHAWK_ALLOW_INSECURE_WASM_FALLBACK=false
      - MOHAWK_ROUTER_URL=http://federated-router:8087
      - MOHAWK_ROUTER_SOURCE_VERTICAL=oncology
      - MOHAWK_ROUTER_TARGET_VERTICAL=supply-chain
      - MOHAWK_ROUTER_MODEL_ID=node-agent-oncology-insight
      - MOHAWK_API_AUTH_MODE=file-only
      - MOHAWK_API_TOKEN_FILE=/run/secrets/mohawk_api_token
      - MOHAWK_API_ENFORCE_ROLES=true
      - MOHAWK_API_BRIDGE_ALLOWED_ROLES=bridge,admin
      - MOHAWK_API_HYBRID_ALLOWED_ROLES=verifier,admin
      - MOHAWK_UTILITY_RATE_LIMIT_PER_MIN=240
      - MOHAWK_UTILITY_ENFORCE_ROLES=true
      - MOHAWK_UTILITY_MINT_ALLOWED_ROLES=minter,admin
      - MOHAWK_UTILITY_TRANSFER_ALLOWED_ROLES=user,operator,admin
      - MOHAWK_UTILITY_BACKUP_ALLOWED_ROLES=operator,admin
      - MOHAWK_UTILITY_RESTORE_ALLOWED_ROLES=admin
    volumes:
      - ./runtime-secrets/mohawk_api_token:/run/secrets/mohawk_api_token:ro
      - ./runtime-secrets/mohawk_tpm_ca_cert.pem:/run/secrets/mohawk_tpm_ca_cert.pem:ro
      - ./runtime-secrets/mohawk_tpm_client_cert.pem:/run/secrets/mohawk_tpm_node_cert.pem:ro
      - ./runtime-secrets/mohawk_tpm_client_key.pem:/run/secrets/mohawk_tpm_node_key.pem:ro
    depends_on:
      orchestrator:
        condition: service_healthy
      runtime-secrets-init:
        condition: service_completed_successfully
      ipfs:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1536m
        reservations:
          cpus: '0.75'
          memory: 768m
    restart: unless-stopped
    networks:
      - mohawk-net

  node-agent-3:
    build:
      context: .
      dockerfile: cmd/node-agent/Dockerfile
    container_name: node-agent-3
    environment:
      - ORCHESTRATOR_URL=https://orchestrator:8080
      - ORCHESTRATOR_SERVER_NAME=orchestrator
      - NODE_ID=node-3
      - IPFS_API_ENDPOINT=http://ipfs:5001
      - MOHAWK_LIBP2P_PORT=4003
      - MOHAWK_TRANSPORT_KEX_MODE=${MOHAWK_TRANSPORT_KEX_MODE:-x25519-mlkem768-hybrid}
      - MOHAWK_DISABLE_QUIC=true
      - MOHAWK_TPM_IDENTITY_SIG_MODE=${MOHAWK_TPM_IDENTITY_SIG_MODE:-xmss}
      - MOHAWK_TPM_CA_CERT_FILE=/run/secrets/mohawk_tpm_ca_cert.pem
      - MOHAWK_TPM_CERT_FILE=/run/secrets/mohawk_tpm_node_cert.pem
      - MOHAWK_TPM_KEY_FILE=/run/secrets/mohawk_tpm_node_key.pem
      - MOHAWK_ALLOW_INSECURE_WASM_FALLBACK=false
      - MOHAWK_ROUTER_URL=http://federated-router:8087
      - MOHAWK_ROUTER_SOURCE_VERTICAL=climate
      - MOHAWK_ROUTER_TARGET_VERTICAL=agriculture
      - MOHAWK_ROUTER_MODEL_ID=node-agent-agri-insight
      - MOHAWK_API_AUTH_MODE=file-only
      - MOHAWK_API_TOKEN_FILE=/run/secrets/mohawk_api_token
      - MOHAWK_API_ENFORCE_ROLES=true
      - MOHAWK_API_BRIDGE_ALLOWED_ROLES=bridge,admin
      - MOHAWK_API_HYBRID_ALLOWED_ROLES=verifier,admin
      - MOHAWK_UTILITY_RATE_LIMIT_PER_MIN=240
      - MOHAWK_UTILITY_ENFORCE_ROLES=true
      - MOHAWK_UTILITY_MINT_ALLOWED_ROLES=minter,admin
      - MOHAWK_UTILITY_TRANSFER_ALLOWED_ROLES=user,operator,admin
      - MOHAWK_UTILITY_BACKUP_ALLOWED_ROLES=operator,admin
      - MOHAWK_UTILITY_RESTORE_ALLOWED_ROLES=admin
    volumes:
      - ./runtime-secrets/mohawk_api_token:/run/secrets/mohawk_api_token:ro
      - ./runtime-secrets/mohawk_tpm_ca_cert.pem:/run/secrets/mohawk_tpm_ca_cert.pem:ro
      - ./runtime-secrets/mohawk_tpm_client_cert.pem:/run/secrets/mohawk_tpm_node_cert.pem:ro
      - ./runtime-secrets/mohawk_tpm_client_key.pem:/run/secrets/mohawk_tpm_node_key.pem:ro
    depends_on:
      orchestrator:
        condition: service_healthy
      runtime-secrets-init:
        condition: service_completed_successfully
      ipfs:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1536m
        reservations:
          cpus: '0.75'
          memory: 768m
    restart: unless-stopped
    networks:
      - mohawk-net

networks:
  mohawk-net:
    driver: bridge

volumes:
  prometheus-data:
    driver: local
  alertmanager-data:
    driver: local
  grafana-data:
    driver: local
  ipfs-data:
    driver: local
