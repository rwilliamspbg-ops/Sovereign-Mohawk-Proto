name: Weekly Readiness Digest

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  digest:
    name: Weekly Readiness + Chaos Digest
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Advisory host UDP/sysctl preflight (non-blocking)
        run: |
          chmod +x scripts/validate_host_network_tuning.sh
          if ! ./scripts/validate_host_network_tuning.sh; then
            echo "::warning::Host UDP/sysctl tuning is below production target on this runner (advisory only)."
            echo "host_udp_sysctl_preflight_failed=true" > /tmp/host-preflight-warning.txt
          fi

      - name: Start monitoring stack
        run: |
          docker compose up -d --build orchestrator prometheus tpm-metrics pyapi-metrics-exporter grafana

      - name: Run readiness gate
        run: |
          mkdir -p reports/chaos
          python3 scripts/mainnet_readiness_gate.py \
            --min-bridge-transfers 1 \
            --min-proof-verifications 1 \
            --min-hybrid-verifications 1 \
            > reports/readiness-report.json

      - name: Run chaos drills
        run: |
          for scenario in tpm-metrics orchestrator prometheus grafana; do
            RECOVERY_LATENCY_MAX_SECONDS=120 bash scripts/chaos_readiness_drill.sh "$scenario" reports/chaos
          done

      - name: Generate digest markdown
        run: |
          python3 scripts/generate_readiness_digest.py \
            --readiness-report reports/readiness-report.json \
            --chaos-dir reports/chaos \
            --output reports/weekly-readiness-digest.md > /tmp/weekly-digest.txt

      - name: Append host preflight advisory to digest
        run: |
          if [ -f /tmp/host-preflight-warning.txt ]; then
            printf '\n## Host Preflight Advisory\n\n- Host UDP/socket kernel tuning on the CI runner was below production target during this run.\n- This is advisory-only in CI; production environments should apply the documented `net.core.rmem_*` and `net.core.wmem_*` settings.\n' >> reports/weekly-readiness-digest.md
            printf '\n## Host Preflight Advisory\n\n- Host UDP/socket kernel tuning on the CI runner was below production target during this run.\n- This is advisory-only in CI; production environments should apply the documented `net.core.rmem_*` and `net.core.wmem_*` settings.\n' >> /tmp/weekly-digest.txt
          fi

      - name: Publish digest to job summary
        run: |
          cat /tmp/weekly-digest.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Slack or Teams (optional)
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from urllib import request

          digest_path = "reports/weekly-readiness-digest.md"
          with open(digest_path, "r", encoding="utf-8") as f:
              digest = f.read()

          run_url = f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          text = f"Weekly Mainnet Readiness Digest\nRun: {run_url}\n\n{digest}"

          if len(text) > 3500:
              text = text[:3500] + "\n\n[truncated] See workflow artifacts for full digest."

          payload = json.dumps({"text": text}).encode("utf-8")

          for env_name in ("SLACK_WEBHOOK_URL", "TEAMS_WEBHOOK_URL"):
              webhook = os.environ.get(env_name, "").strip()
              if not webhook:
                  continue
              req = request.Request(webhook, data=payload, headers={"Content-Type": "application/json"})
              with request.urlopen(req, timeout=10) as resp:
                  print(f"{env_name}: {resp.status}")
          PY

      - name: Upload digest artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: weekly-readiness-digest
          path: |
            reports/readiness-report.json
            reports/chaos/*.json
            reports/weekly-readiness-digest.md

      - name: Stop stack
        if: always()
        run: |
          docker compose down -v
