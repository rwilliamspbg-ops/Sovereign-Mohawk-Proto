name: Tamper-Evident Audit Export

on:
  workflow_dispatch:
  schedule:
    - cron: "30 3 * * *"

concurrency:
  group: tamper-evident-audit-export-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  export-audit-bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Generate tamper-evident audit bundle
        run: |
          python3 scripts/export_tamper_evident_events.py \
            --output-dir test-results/tamper-evident-events

      - name: Validate tamper-evident bundle integrity
        run: |
          python3 scripts/ci/check_tamper_evident_bundle.py \
            --bundle-dir test-results/tamper-evident-events

      - name: Upload tamper-evident audit artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: tamper-evident-events-bundle
          path: test-results/tamper-evident-events/