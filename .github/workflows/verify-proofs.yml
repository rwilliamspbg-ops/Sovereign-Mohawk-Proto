name: Proof-Driven Design Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install audit dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Run proof and capability audit
        run: |
          chmod +x scripts/audit_proofs.sh
          ./scripts/audit_proofs.sh
