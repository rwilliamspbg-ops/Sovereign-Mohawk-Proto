name: Proof-Driven Design Verification

on:
  push:
    branches: [ main ]
    paths:
      - 'proofs/**'
      - 'scripts/check_refinement.py'
      - 'scripts/audit_proofs.sh'
      - 'Makefile'
      - 'scripts/ci/**'
      - '.github/workflows/verify-proofs.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'proofs/**'
      - 'scripts/check_refinement.py'
      - 'scripts/audit_proofs.sh'
      - 'Makefile'
      - 'scripts/ci/**'
      - '.github/workflows/verify-proofs.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install audit dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Run proof and capability audit
        run: |
          chmod +x scripts/audit_proofs.sh
          ./scripts/audit_proofs.sh

  verify-lean-formalization:
    runs-on: ubuntu-latest
    env:
      MATHLIB_CACHE_DIR: ${{ github.workspace }}/proofs/.lake/mathlib-cache
    steps:
      - name: Free up disk space (critical for Mathlib)
        run: |
          df -h
          echo "Cleaning up runner..."
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/lib/jvm /usr/local/.ghcup /usr/share/swift /usr/local/share/powershell
          sudo docker image prune -a -f || true
          sudo docker builder prune -a -f || true
          sudo rm -rf "$AGENT_TOOLSDIRECTORY" || true
          df -h

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Restore Lean/Lake cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: |
            proofs/.lake/packages
            proofs/.lake/build
          key: lean-lake-${{ runner.os }}-${{ hashFiles('proofs/lean-toolchain', 'proofs/lakefile.lean', 'proofs/lake-manifest.json') }}
          restore-keys: |
            lean-lake-${{ runner.os }}-

      - name: Install elan
        run: |
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Fetch prebuilt Mathlib cache
        working-directory: proofs
        run: |
          lake update
          lake exe cache get

      - name: Ensure no unsafe placeholders and track `sorry`
        working-directory: proofs
        run: |
          if grep -RIn '\baxiom\b\|\badmit\b' LeanFormalization Specification Refinement *.lean; then
            echo "❌ Unsafe formal proof placeholders detected (axiom/admit)"
            exit 1
          fi

          SORRY_COUNT=$(grep -RIn '\bsorry\b' LeanFormalization Specification Refinement *.lean | wc -l || true)
          echo "ℹ sorry placeholders detected: $SORRY_COUNT"

      - name: Validate formal traceability matrix
        working-directory: proofs
        run: |
          chmod +x ../scripts/ci/validate_formal_traceability.sh
            ../scripts/ci/validate_formal_traceability.sh

      - name: Build Lean formal theorem suite
        working-directory: proofs
        run: |
          lake build LeanFormalization
          lake build Specification
          lake build Refinement
          echo "✅ All formal theorems compiled successfully."

      - name: Check spec-to-implementation refinement alignment
        run: |
          python3 scripts/check_refinement.py \
            --lean proofs/Specification/System.lean \
            --go internal/

      - name: Check theorem/runtime consistency
        run: |
          python3 scripts/ci/check_theorem_runtime_consistency.py

      - name: Lint formal proof claims
        run: |
          python3 scripts/ci/lint_formal_proof_claims.py

      - name: Cleanup transient Mathlib cache
        if: always()
        run: |
          rm -rf "$MATHLIB_CACHE_DIR" || true

      - name: Save Lean/Lake cache
        if: always()
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: |
            proofs/.lake/packages
            proofs/.lake/build
          key: lean-lake-${{ runner.os }}-${{ hashFiles('proofs/lean-toolchain', 'proofs/lakefile.lean', 'proofs/lake-manifest.json') }}

      - name: Generate formal proof artifacts
        working-directory: proofs
        run: |
          chmod +x ../scripts/ci/generate_formal_proof_artifacts.sh
          ../scripts/ci/generate_formal_proof_artifacts.sh

      - name: Generate machine-checkable formal validation report
        run: |
          python3 scripts/ci/generate_formal_validation_report.py

      - name: Validate machine-checkable formal validation report
        run: |
          python3 scripts/ci/generate_formal_validation_report.py --check

      - name: Build and verify formal verification bundle
        run: |
          python3 scripts/ci/build_formal_verification_bundle.py
          python3 scripts/ci/verify_formal_verification_bundle.py

      - name: Run formal validation tooling tests
        run: |
          make validate-formal-tooling-tests

      - name: Upload formal proof artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: formal-proof-artifacts
          path: |
            results/proofs/formal_theorem_index.txt
            results/proofs/formal_traceability_matrix_snapshot.md
            results/proofs/formal_placeholder_scan.txt
            results/proofs/formal_validation_report.json
            results/proofs/formal-verification-bundle/bundle_manifest.json
            results/proofs/formal-verification-bundle.tar.gz
