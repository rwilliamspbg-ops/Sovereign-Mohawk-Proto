name: Proof-Driven Design Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install audit dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Run proof and capability audit
        run: |
          chmod +x scripts/audit_proofs.sh
          ./scripts/audit_proofs.sh

  verify-lean-formalization:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: proofs
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install elan
        run: |
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Ensure no placeholder proofs
        run: |
          if grep -RIn "\bsorry\b\|\baxiom\b\|\badmit\b" LeanFormalization *.lean; then
            echo "Formal proof placeholders detected"
            exit 1
          fi

      - name: Validate formal traceability matrix
        run: |
          chmod +x ../scripts/ci/validate_formal_traceability.sh
          ../scripts/ci/validate_formal_traceability.sh

      - name: Build Lean formal theorem suite
        run: |
          lake update
          lake build LeanFormalization Mathlib

      - name: Generate formal proof artifacts
        run: |
          chmod +x ../scripts/ci/generate_formal_proof_artifacts.sh
          ../scripts/ci/generate_formal_proof_artifacts.sh

            - name: Upload formal proof artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: formal-proof-artifacts
          path: |
            results/proofs/formal_theorem_index.txt
            results/proofs/formal_traceability_matrix_snapshot.md
            results/proofs/formal_placeholder_scan.txt
