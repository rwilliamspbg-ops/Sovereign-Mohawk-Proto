name: Build Verification
on: [push, pull_request]
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23' # Using stable 1.23 to avoid environment crashes
      - name: Verify Build
        run: |
          if [ -f "main.go" ]; then go build -v ./...; fi
          echo "Build verification successful."
