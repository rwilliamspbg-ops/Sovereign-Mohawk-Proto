name: Build Verification
on: [push]
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Verify
        run: |
          # If you have a main.go, this will verify it. 
          # If it's just a paper, it will simply pass.
          if [ -f "main.go" ]; then go build ./...; fi
