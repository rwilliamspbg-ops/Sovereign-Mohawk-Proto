name: Mohawk Master CI

on:
  push:
    branches: [ main ]
    paths-ignore: ['README.md', 'docs/**']
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  relation-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Verify Cross-Repo Relations
        run: |
          echo "Verifying Sovereign Mohawk ecosystem relations..."
          # 1. Check for Go 1.24 Sync
          grep "go 1.24" go.mod || (echo "Error: go.mod version mismatch" && exit 1)
          
          # 2. Check for Critical Protocol Files
          FILES=("main.go" "go.mod" ".github/workflows/main.yml" ".github/workflows/badge-guard.yml")
          for f in "${FILES[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::error::Relation Broken: Missing critical file $f"
              exit 1
            fi
          done

  logic-verification:
    needs: relation-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: BFT Simulation
        run: |
          go mod tidy
          go test -v -race ./...
