name: Mohawk Master CI

on:
  push:
    branches: [ main ]
    paths-ignore: ['README.md', 'docs/**']
  workflow_dispatch:

# Prevents the "Red Wall" by cancelling old runs when you push new code
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: Verify Dependencies
        run: |
          go mod tidy
          go mod verify
      - name: BFT & Logic Test Suite
        run: go test -v -race ./...
