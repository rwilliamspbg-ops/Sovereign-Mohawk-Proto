name: Mohawk Master CI

on:
  push:
    branches: [ main ]
    paths-ignore: ['README.md', 'docs/**']
  pull_request:
    branches: [ main ]

jobs:
  verify-runtime:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go (Synced Version)
        uses: actions/setup-go@v5
        with:
          go-version: '1.24' # Corrected to match research spec
          cache: true

      - name: Synchronize Dependencies
        run: |
          go mod edit -go=1.24
          go mod tidy

      - name: Protocol Verification
        run: |
          go build -v ./...
          go test -v ./...
