name: Mohawk Master CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build
        run: |
          if [ -f "main.go" ]; then
            go build -v ./...
          else
            echo "No Go files yet."
          fi

      - name: Check HTML
        run: |
          if [ -f "index.html" ]; then
            grep -q "<html" index.html && echo "HTML looks good."
          else
            echo "index.html not found."
          fi
