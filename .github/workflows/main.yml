name: Mohawk Master CI

on:
  push:
    branches: [ main ]
    paths-ignore: ['README.md', 'docs/**']
  workflow_dispatch:

permissions:
  contents: read
  security-events: write # Fixes the "Security Alert" failures

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24' # Synchronized with Spec
          cache: true
      - name: BFT Logic Verification
        run: |
          go mod tidy
          go test -v -race ./...
