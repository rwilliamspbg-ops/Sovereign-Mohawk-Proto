name: Mohawk Master CI
on:
  push:
    branches: [ main ]
    paths-ignore: ['README.md', '.github/workflows/badge-guard.yml']
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: {go-version: '1.21'}
      - run: |
          go mod tidy
          go build -v ./...
          go test -v ./...
