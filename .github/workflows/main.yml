name: Mohawk Master CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-protocol:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Protocol Check
        run: |
          go version
          # This is where your BFT/zk-SNARK tests live
          if [ -f "go.mod" ]; then
            go mod download
            go test -v ./...
          else
            echo "Awaiting go.mod initialization..."
          fi
