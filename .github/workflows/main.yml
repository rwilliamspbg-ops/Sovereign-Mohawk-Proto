name: Mohawk Master CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - '.github/workflows/badge-guard.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Verify Logic
        run: |
          if [ -f "go.mod" ]; then
            go mod download
            go test -v ./...
          else
            echo "No go.mod found, skipping tests."
          fi
