name: Mohawk Master CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run Build
        run: |
          if [ -f "main.go" ]; then
            go build -v ./...
          else
            echo "No Go files yet."
          fi

      - name: Check HTML
        run: grep -q "<html" index.html && echo "HTML looks good."
