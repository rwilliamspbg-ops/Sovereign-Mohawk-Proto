name: Swarm Runtime Matrix

on:
  workflow_dispatch:
    inputs:
      node_counts:
        description: "Comma-separated node counts"
        required: false
        default: "500,1000,1500"
      timeout_seconds:
        description: "Per-profile timeout budget"
        required: false
        default: "1800"
      safe_ratio:
        description: "Malicious ratio expected to pass"
        required: false
        default: "0.44"
      edge_ratio:
        description: "Malicious ratio expected to fail (>0.555)"
        required: false
        default: "0.56"
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: read

  env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    GOTOOLCHAIN: go1.25.9+auto
    MOHAWK_ROUTER_ALLOW_INSECURE_DEV_QUOTES: "true"

jobs:
  swarm-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: 'go.mod'

      - name: Router-on preflight smoke
        run: |
          set -euo pipefail

          mkdir -p test-results/swarm-runtime
          nohup go run ./cmd/federated-router > test-results/swarm-runtime/router.log 2>&1 &
          echo $! > test-results/swarm-runtime/router.pid

          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8087/healthz >/dev/null; then
              break
            fi
            sleep 1
          done

          ROUTER_URL=http://127.0.0.1:8087 ./scripts/router_smoke_discovery.sh \
            | tee test-results/swarm-runtime/router_smoke.txt
          curl -fsS http://127.0.0.1:8088/metrics | head -n 120 > test-results/swarm-runtime/router_metrics_snapshot.prom

      - name: Run runtime swarm profile matrix
        env:
          INPUT_NODE_COUNTS: ${{ github.event.inputs.node_counts || '500,1000,1500' }}
          INPUT_TIMEOUT_SECONDS: ${{ github.event.inputs.timeout_seconds || '1800' }}
          INPUT_SAFE_RATIO: ${{ github.event.inputs.safe_ratio || '0.44' }}
          INPUT_EDGE_RATIO: ${{ github.event.inputs.edge_ratio || '0.56' }}
        run: |
          set -euo pipefail

          mkdir -p test-results/swarm-runtime

          IFS=',' read -ra NODE_COUNTS <<< "${INPUT_NODE_COUNTS}"
          TIMEOUT_SECONDS="${INPUT_TIMEOUT_SECONDS}"

          for n in "${NODE_COUNTS[@]}"; do
            NODE_COUNT="$(echo "$n" | xargs)"
            if [ -z "$NODE_COUNT" ]; then
              continue
            fi

            echo "Running safe-profile runtime test for ${NODE_COUNT} nodes"
            timeout "${TIMEOUT_SECONDS}"s env \
              MOHAWK_SWARM_NODE_COUNT="$NODE_COUNT" \
              MOHAWK_SWARM_MALICIOUS_RATIO="${INPUT_SAFE_RATIO}" \
              MOHAWK_SWARM_EXPECT_FAILURE=false \
              go test -json ./test -run '^TestSwarmRuntimeProfileFromEnv$' \
              | tee "test-results/swarm-runtime/${NODE_COUNT}_safe.jsonl"

            echo "Running edge-profile runtime test for ${NODE_COUNT} nodes"
            timeout "${TIMEOUT_SECONDS}"s env \
              MOHAWK_SWARM_NODE_COUNT="$NODE_COUNT" \
              MOHAWK_SWARM_MALICIOUS_RATIO="${INPUT_EDGE_RATIO}" \
              MOHAWK_SWARM_EXPECT_FAILURE=true \
              go test -json ./test -run '^TestSwarmRuntimeProfileFromEnv$' \
              | tee "test-results/swarm-runtime/${NODE_COUNT}_edge.jsonl"
          done

          {
            echo "# Swarm Runtime Matrix Summary"
            echo
            echo "- Node counts: ${INPUT_NODE_COUNTS}"
            echo "- Per-profile timeout: ${TIMEOUT_SECONDS}s"
            echo "- Safe malicious ratio: ${INPUT_SAFE_RATIO}"
            echo "- Edge malicious ratio: ${INPUT_EDGE_RATIO}"
            echo "- Router preflight: PASS"
            echo "- Router metrics snapshot: test-results/swarm-runtime/router_metrics_snapshot.prom"
            echo "- Output path: test-results/swarm-runtime/"
          } > test-results/swarm-runtime/summary.md

      - name: Build scaled benchmark report artifacts
        run: |
          python3 scripts/publish_swarm_runtime_benchmarks.py
          cat test-results/swarm-runtime/scaled_swarm_benchmark_report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload swarm runtime artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: swarm-runtime-matrix-artifacts
          path: test-results/swarm-runtime/

      - name: Stop router preflight process
        if: always()
        run: |
          set -euo pipefail
          if [ -f test-results/swarm-runtime/router.pid ]; then
            kill "$(cat test-results/swarm-runtime/router.pid)" || true
          fi
