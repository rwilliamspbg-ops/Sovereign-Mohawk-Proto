name: Bridge Compression Benchmark

"on":
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '45 4 * * 1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GOTOOLCHAIN: go1.25.9+auto
  BRIDGE_BENCH_TIME: "200ms"
  BRIDGE_BENCH_COUNT: "5"
  BRIDGE_BENCH_CPU: "2"
  BRIDGE_BENCHSTAT_ALPHA: "0.01"
  BRIDGE_REGRESSION_THRESHOLD_PCT: "5.0"

jobs:
  bridge-compression-format-compare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: 'go.mod'

      - name: Install benchstat
        run: |
          ./scripts/go_with_toolchain.sh go install golang.org/x/perf/cmd/benchstat@latest
          echo "$(./scripts/go_with_toolchain.sh go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run bridge compression comparison
        run: |
          chmod +x scripts/benchmark_bridge_compression_compare.sh
          BENCH_TIME="${BRIDGE_BENCH_TIME}" \
          BENCH_COUNT="${BRIDGE_BENCH_COUNT}" \
          BENCHSTAT_ALPHA="${BRIDGE_BENCHSTAT_ALPHA}" \
          BENCH_CPU="${BRIDGE_BENCH_CPU}" \
          USE_DOCKER="0" \
          REPORT_PATH="results/metrics/bridge_compression_benchmark_compare.md" \
          RAW_PATH="results/metrics/bridge_compression_benchmark_raw.txt" \
          ./scripts/benchmark_bridge_compression_compare.sh

      - name: Upload bridge compression benchmark artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: bridge-compression-format-artifacts
          path: |
            results/metrics/bridge_compression_benchmark_compare.md
            results/metrics/bridge_compression_benchmark_raw.txt

  bridge-baseline-main:
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'schedule'
    needs: bridge-compression-format-compare
    runs-on: ubuntu-latest
    steps:
      - name: Download bridge format artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: bridge-compression-format-artifacts
          path: .benchmarks/bridge/current_artifacts

      - name: Save bridge benchmark baseline file
        run: |
          mkdir -p .benchmarks/bridge
          CURRENT_RAW="$(find .benchmarks/bridge/current_artifacts -type f -name 'bridge_compression_benchmark_raw.txt' | head -n 1)"
          if [ -z "$CURRENT_RAW" ]; then
            echo "error: bridge_compression_benchmark_raw.txt not found after artifact download"
            find .benchmarks/bridge/current_artifacts -maxdepth 4 -type f | sort || true
            exit 1
          fi
          cp "$CURRENT_RAW" .benchmarks/bridge/base_main_raw.txt

      - name: Save baseline in GitHub Actions cache
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: .benchmarks/bridge/base_main_raw.txt
          key: bridge-main-${{ github.sha }}

      - name: Upload bridge baseline artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: bridge-baseline-main
          path: .benchmarks/bridge/base_main_raw.txt

  bridge-regression-compare:
    if: github.event_name == 'pull_request'
    needs: bridge-compression-format-compare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: 'go.mod'

      - name: Install benchstat
        run: |
          ./scripts/go_with_toolchain.sh go install golang.org/x/perf/cmd/benchstat@latest
          echo "$(./scripts/go_with_toolchain.sh go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Detect performance-impacting changes
        id: perf_changes
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          git fetch --no-tags origin "$BASE_SHA" "$HEAD_SHA"

          if git merge-base "$BASE_SHA" "$HEAD_SHA" >/dev/null 2>&1; then
            CHANGED_FILES="$(git diff --name-only "$BASE_SHA...$HEAD_SHA")"
          else
            echo "warning: no merge base for $BASE_SHA and $HEAD_SHA; using two-dot diff fallback"
            CHANGED_FILES="$(git diff --name-only "$BASE_SHA..$HEAD_SHA")"
          fi

          echo "$CHANGED_FILES"

          if echo "$CHANGED_FILES" | grep -Eq '^(internal/pyapi/|internal/bridge/|cmd/pyapi-metrics-exporter/|scripts/benchmark_bridge_compression_compare\.sh$|scripts/go_with_toolchain\.sh$|go\.mod$|go\.sum$|test/)'; then
            echo "run_benchmark=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_benchmark=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download bridge format artifacts
        if: steps.perf_changes.outputs.run_benchmark == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: bridge-compression-format-artifacts
          path: .benchmarks/bridge/current_artifacts

      - name: Restore bridge baseline cache from main
        if: steps.perf_changes.outputs.run_benchmark == 'true'
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: .benchmarks/bridge/base_main_raw.txt
          key: bridge-main-${{ github.sha }}
          restore-keys: |
            bridge-main-

      - name: Require cached bridge baseline
        if: steps.perf_changes.outputs.run_benchmark == 'true'
        run: |
          if [ ! -s .benchmarks/bridge/base_main_raw.txt ]; then
            echo "error: missing cached bridge baseline from main"
            echo "hint: run this workflow on main to seed bridge-main-* cache"
            exit 1
          fi

      - name: Build bridge regression report
        if: steps.perf_changes.outputs.run_benchmark == 'true'
        run: |
          mkdir -p results/metrics
          CURRENT_RAW="$(find .benchmarks/bridge/current_artifacts -type f -name 'bridge_compression_benchmark_raw.txt' | head -n 1)"
          if [ -z "$CURRENT_RAW" ]; then
            echo "error: bridge current raw benchmark file not found"
            find .benchmarks/bridge/current_artifacts -maxdepth 4 -type f | sort || true
            exit 1
          fi
          benchstat -alpha "${BRIDGE_BENCHSTAT_ALPHA}" .benchmarks/bridge/base_main_raw.txt "$CURRENT_RAW" > .benchmarks/bridge/benchstat.txt
          {
            echo "# Bridge Compression Regression Compare"
            echo
            echo "- Baseline source: cached main benchmark"
            echo "- Baseline cache key prefix: bridge-main-"
            echo "- PR ref: ${{ github.head_ref }}"
            echo "- Alpha: ${BRIDGE_BENCHSTAT_ALPHA}"
            echo "- Regression fail threshold: +${BRIDGE_REGRESSION_THRESHOLD_PCT}% geomean sec/op"
            echo
            echo '```text'
            cat .benchmarks/bridge/benchstat.txt
            echo '```'
          } > results/metrics/bridge_compression_regression_compare.md

      - name: Write skipped bridge benchmark report
        if: steps.perf_changes.outputs.run_benchmark != 'true'
        run: |
          mkdir -p results/metrics
          {
            echo "# Bridge Compression Regression Compare"
            echo
            echo "Benchmark gate skipped because no bridge performance-impacting paths changed in this PR."
            echo
            echo "Paths considered bridge performance-impacting: internal/pyapi/, internal/bridge/, cmd/pyapi-metrics-exporter/, test/, go.mod, go.sum, and benchmark scripts"
          } > results/metrics/bridge_compression_regression_compare.md

      - name: Enforce bridge regression threshold
        if: steps.perf_changes.outputs.run_benchmark == 'true'
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          threshold = float(os.environ["BRIDGE_REGRESSION_THRESHOLD_PCT"])
          text = Path(".benchmarks/bridge/benchstat.txt").read_text(encoding="utf-8")

          in_time_block = False
          delta = None
          for line in text.splitlines():
            if "delta" in line and ("sec/op" in line or "ns/op" in line or "time/op" in line):
              in_time_block = True
              continue
            if in_time_block and line.strip().startswith("geomean"):
              m = re.search(r"([+-]?[0-9]+(?:\.[0-9]+)?)%", line)
              if m:
                delta = float(m.group(1))
              break

          if delta is None:
            # Fallback: accept first geomean percentage if table headers differ.
            for line in text.splitlines():
              if line.strip().startswith("geomean"):
                m = re.search(r"([+-]?[0-9]+(?:\.[0-9]+)?)%", line)
                if m:
                  delta = float(m.group(1))
                  break

          if delta is None:
            print("error: unable to parse geomean regression from benchstat output")
            raise SystemExit(1)

          print(f"parsed geomean sec/op delta: {delta:.2f}% (threshold: +{threshold:.2f}%)")
          if delta > threshold:
            print("error: bridge regression threshold exceeded")
            raise SystemExit(1)
          PY

      - name: Upload bridge regression artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: bridge-compression-regression-report
          path: |
            results/metrics/bridge_compression_regression_compare.md
            .benchmarks/bridge/benchstat.txt
            .benchmarks/bridge/base_main_raw.txt
            .benchmarks/bridge/current_artifacts/
