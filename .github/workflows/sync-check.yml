name: Capability Sync Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Using a specific stable version to prevent environment drift
          python-version: '3.11'

      - name: Install Dependencies
        # If your validation script needs specific libraries (like pandas or requests)
        # make sure they are installed or listed in a requirements.txt
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Validation Script
        # Ensure the path matches your repository structure
        run: python scripts/validate_capabilities.py
