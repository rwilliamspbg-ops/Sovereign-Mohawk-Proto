name: Capability Sync Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  validate-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          # Using 3.11 for stability with your SDK logic
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Add any specific sync-check requirements here
          # pip install -r requirements.txt

      - name: Run Capability Validation
        # This targets your central capabilities.json against the node logic
        run: python scripts/validate_capabilities.py
