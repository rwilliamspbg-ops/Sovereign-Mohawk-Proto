name: Publish Docker Images (CI)

on:
  push:
    branches: [ main ]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: orchestrator
            dockerfile: cmd/orchestrator/Dockerfile
          - image_name: node-agent
            dockerfile: cmd/node-agent/Dockerfile
          - image_name: fl-aggregator
            dockerfile: cmd/fl-aggregator/Dockerfile
          - image_name: api-dashboard
            dockerfile: cmd/api-dashboard/Dockerfile

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set lowercase owner
        id: owner
        run: |
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        run: |
          image="ghcr.io/${{ steps.owner.outputs.owner }}/sovereign-mohawk-${{ matrix.image_name }}"
          sha_tag="${image}:sha-${GITHUB_SHA::12}"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            ref_tag="${image}:${GITHUB_REF_NAME}"
            latest_tag="${image}:latest"
            echo "tags=${sha_tag},${ref_tag},${latest_tag}" >> "$GITHUB_OUTPUT"
          else
            main_tag="${image}:main"
            echo "tags=${sha_tag},${main_tag}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          provenance: false
