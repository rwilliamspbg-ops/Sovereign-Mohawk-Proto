name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build Wasm Module
        run: |
          cd wasm-modules/fl_task
          cargo build --target wasm32-unknown-unknown --release
      - name: Go Build and Test
        run: |
          mkdir -p test-results
          source scripts/ensure_go_toolchain.sh
          go mod tidy
          go build ./...
          set -o pipefail
          go test -json ./... | tee test-results/go-test-report.jsonl
      - name: Validate Capabilities
        run: python3 scripts/validate_capabilities.py

      - name: Install Python SDK Test Dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e ./sdk/python[dev]

      - name: Python SDK Tests
        run: |
          mkdir -p test-results
          cd sdk/python
          pytest -q --junitxml=../../test-results/python-sdk-junit.xml

      - name: Verify Python SDK WASM Examples
        run: |
          python3 sdk/python/examples/wasm_hot_reload_demo.py --ci
          python3 sdk/python/examples/wasm_hot_reload_async_demo.py --ci

      - name: Verify Docker Stack
        run: docker compose config

      - name: Prepare runtime secrets
        run: |
          mkdir -p runtime-secrets
          if [ ! -s runtime-secrets/mohawk_api_token ]; then
            python3 -c 'import secrets, pathlib; pathlib.Path("runtime-secrets/mohawk_api_token").write_text(secrets.token_hex(24), encoding="utf-8")'
          fi
          if [ ! -s runtime-secrets/mohawk_tpm_ca_cert.pem ] || [ ! -s runtime-secrets/mohawk_tpm_ca_key.pem ]; then
            openssl req -x509 -newkey rsa:3072 \
              -keyout runtime-secrets/mohawk_tpm_ca_key.pem \
              -out runtime-secrets/mohawk_tpm_ca_cert.pem \
              -sha256 -days 365 -nodes \
              -subj "/CN=Sovereign-Mohawk TPM Root/O=Sovereign-Mohawk" >/dev/null 2>&1
          fi

      - name: Monitoring Smoke Check
        run: |
          mkdir -p test-results
          docker compose up -d --build orchestrator prometheus tpm-metrics
          for i in {1..30}; do
            if curl -fsS http://localhost:9090/-/healthy >/dev/null; then
              break
            fi
            sleep 2
          done
          for i in {1..30}; do
            if curl -fsS "http://localhost:9090/api/v1/query?query=mohawk_utility_coin_total_supply" | grep -q 'mohawk_utility_coin_total_supply'; then
              break
            fi
            sleep 2
          done
          curl -fsS "http://localhost:9090/api/v1/query?query=mohawk_utility_coin_total_supply" | tee test-results/monitoring-smoke-query.json
          grep 'mohawk_utility_coin_total_supply' test-results/monitoring-smoke-query.json
          docker compose down -v

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build OCI image artifacts for workflow downloads
        run: |
          mkdir -p test-results/docker-images
          docker buildx build \
            --file cmd/orchestrator/Dockerfile \
            --tag mohawk/orchestrator:ci \
            --output type=oci,dest=test-results/docker-images/orchestrator-ci.oci.tar \
            .
          docker buildx build \
            --file cmd/node-agent/Dockerfile \
            --tag mohawk/node-agent:ci \
            --output type=oci,dest=test-results/docker-images/node-agent-ci.oci.tar \
            .
          sha256sum test-results/docker-images/*.tar > test-results/docker-images/sha256sums.txt

      - name: Generate source SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: test-results/sbom-source.spdx.json

      - name: Upload build and test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-test-artifacts
          path: |
            test-results/
