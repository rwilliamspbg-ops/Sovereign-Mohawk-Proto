name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build Wasm Module
        run: |
          cd wasm-modules/fl_task
          cargo build --target wasm32-unknown-unknown --release
      - name: Go Build and Test
        run: |
          go mod tidy
          go build ./...
          go test ./...
      - name: Validate Capabilities
        run: python3 scripts/validate_capabilities.py

      - name: Install Python SDK Test Dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e ./sdk/python[dev]

      - name: Python SDK Tests
        run: |
          cd sdk/python
          pytest -q

      - name: Verify Python SDK WASM Examples
        run: |
          python3 sdk/python/examples/wasm_hot_reload_demo.py --ci
          python3 sdk/python/examples/wasm_hot_reload_async_demo.py --ci

      - name: Verify Docker Stack
        run: docker compose config

      - name: Monitoring Smoke Check
        run: |
          docker compose up -d --build orchestrator prometheus tpm-metrics
          for i in {1..30}; do
            if curl -fsS http://localhost:9090/-/healthy >/dev/null; then
              break
            fi
            sleep 2
          done
          for i in {1..30}; do
            if curl -fsS "http://localhost:9090/api/v1/query?query=mohawk_utility_coin_total_supply" | grep -q 'mohawk_utility_coin_total_supply'; then
              break
            fi
            sleep 2
          done
          curl -fsS "http://localhost:9090/api/v1/query?query=mohawk_utility_coin_total_supply" | grep 'mohawk_utility_coin_total_supply'
          docker compose down -v
