name: Security Audit Gate

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GOTOOLCHAIN: go1.25.9+auto

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck (fail on reachable vulns)
        run: govulncheck ./...

  trivy-fs:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Trivy FS scan (HIGH/CRITICAL, fail threshold)
        run: |
          docker run --rm \
            -v "$PWD":/repo \
            -w /repo \
            aquasec/trivy:0.57.1 \
            fs \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --skip-dirs runtime-secrets \
            --exit-code 1 \
            .
