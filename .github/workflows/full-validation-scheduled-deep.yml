name: Full Validation Scheduled Deep

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GOTOOLCHAIN: go1.25.9+auto

jobs:
  full-validation-deep:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: 'go.mod'

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.12'

      - name: Run full validation deep profile
        run: python3 tests/scripts/python/run_full_validation_suite.py --profile deep

      - name: Check validation trends
        run: python3 tests/scripts/ci/check_validation_trends.py --window 20 --min-pass-rate 0.70

      - name: Write validation diff summary
        run: python3 tests/scripts/ci/write_validation_diff_summary.py

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: full-validation-deep-artifacts
          path: test-results/full-validation/
