name: Lint
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Basic HTML Check
        run: |
          echo "Checking HTML for basic errors..."
          # This just checks if the file exists and is readable
          ls -la index.html
