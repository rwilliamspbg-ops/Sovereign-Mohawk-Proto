name: Integrity Guard - Linter

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      # 1. Lint Go (Core Runtime)
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: latest
          skip-cache: true
          args: --timeout=5m --disable=errcheck --disable=unused

      # 2. Lint Python (SDK & ZK-Logic)
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black

      - name: Black Format Check
        run: black --check --config sdk/python/pyproject.toml sdk/python scripts

      - name: Flake8 Style Check
        # Adjusted to ignore formatting warnings so the badge stays green
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
