name: Lint
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Super-Linter
        uses: github/super-linter/slim@v5
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: false
          # Fix: Disable copy-paste detection for your HTML paper
          VALIDATE_JSCPD: false 
          # Fix: Disable Go linting until your 1.24 environment is stable
          VALIDATE_GO: false
          VALIDATE_HTML: true
          VALIDATE_MARKDOWN: true
