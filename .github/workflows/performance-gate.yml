name: Performance Gate
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: performance-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PY_PERF_MEAN_DELTA_MAX_PCT: "10.0"
  PY_PERF_P99_DELTA_MAX_PCT: "15.0"
  PY_PERF_BASELINE_MIN_MS: "0.10"
  PY_PERF_MEAN_ABS_DELTA_MAX_MS: "0.05"
  PY_PERF_P99_ABS_DELTA_MAX_MS: "0.10"

jobs:
  performance-gate:
    name: Performance Regression Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pytest pytest-benchmark numpy
          cd sdk/python && pip install -e .

      - name: Run performance benchmarks
        run: |
          export PYTHONPATH="$PYTHONPATH:$(pwd)/sdk/python"
          pytest sdk/python/tests/test_benchmarks.py \
            --benchmark-only \
            --benchmark-json=benchmark-results.json

      - name: Restore Python performance baseline cache from main
        if: github.event_name == 'pull_request'
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: .benchmarks/python/base_main.json
          key: python-perf-main-${{ github.sha }}
          restore-keys: |
            python-perf-main-

      - name: Performance Gate Check
        run: |
          python3 << 'EOF'
          import json
          import os
          import sys
          from pathlib import Path

          baseline_path = Path('.benchmarks/python/base_main.json')
          mean_delta_max_pct = float(os.environ.get('PY_PERF_MEAN_DELTA_MAX_PCT', '10.0'))
          p99_delta_max_pct = float(os.environ.get('PY_PERF_P99_DELTA_MAX_PCT', '15.0'))
          baseline_min_ms = float(os.environ.get('PY_PERF_BASELINE_MIN_MS', '0.10'))
          mean_abs_delta_max_ms = float(os.environ.get('PY_PERF_MEAN_ABS_DELTA_MAX_MS', '0.05'))
          p99_abs_delta_max_ms = float(os.environ.get('PY_PERF_P99_ABS_DELTA_MAX_MS', '0.10'))

          try:
              with open('benchmark-results.json', 'r') as f:
                  results = json.load(f)
          except FileNotFoundError:
              print("❌ benchmark-results.json not found.")
              sys.exit(1)

          thresholds = {
              'test_verify_proof_performance': {'mean_max_ms': 12.0, 'p99_max_ms': 20.0},
              'test_aggregate_nodes_performance': {'mean_max_ms': 1.0, 'p99_max_ms': 3.0},
              'test_gradient_compression_performance': {'mean_max_ms': 3.0, 'p99_max_ms': 8.0},
          }

          failures = []
          discovered = {benchmark['name'] for benchmark in results.get('benchmarks', [])}

          missing = set(thresholds.keys()) - discovered
          if missing:
              failures.append(f"Missing expected benchmarks: {', '.join(sorted(missing))}")

          baseline_benchmarks = {}
          baseline_loaded = False
          if baseline_path.exists():
              try:
                  with baseline_path.open('r', encoding='utf-8') as f:
                      baseline_results = json.load(f)
                  for benchmark in baseline_results.get('benchmarks', []):
                      name = benchmark.get('name')
                      if name:
                          baseline_benchmarks[name] = benchmark
                  baseline_loaded = True
                  print(f"Loaded baseline benchmark artifact from {baseline_path}")
              except Exception as exc:
                  failures.append(f"Failed to parse baseline benchmark artifact: {exc}")
          else:
              print("No baseline benchmark artifact found in cache; trend checks skipped.")

          for benchmark in results.get('benchmarks', []):
              name = benchmark['name']
              if name not in thresholds:
                  continue
              stats = benchmark.get('stats', {})
              mean_ms = float(stats.get('mean', 0.0)) * 1000.0
              p99_ms = float(stats.get('p99', 0.0)) * 1000.0
              limits = thresholds[name]

              if 'mean_max_ms' in limits and mean_ms > limits['mean_max_ms']:
                  failures.append(f"{name}: mean {mean_ms:.2f}ms > {limits['mean_max_ms']}ms")
              if 'p99_max_ms' in limits and p99_ms > limits['p99_max_ms']:
                  failures.append(f"{name}: p99 {p99_ms:.2f}ms > {limits['p99_max_ms']}ms")

              if baseline_loaded and name in baseline_benchmarks:
                  baseline_stats = baseline_benchmarks[name].get('stats', {})
                  base_mean_ms = float(baseline_stats.get('mean', 0.0)) * 1000.0
                  base_p99_ms = float(baseline_stats.get('p99', 0.0)) * 1000.0
                  mean_abs_delta_ms = mean_ms - base_mean_ms
                  p99_abs_delta_ms = p99_ms - base_p99_ms

                  # For very small baseline values, percent deltas become noisy.
                  # Require both percent and absolute deltas to exceed limits before failing.
                  if base_mean_ms >= baseline_min_ms:
                    mean_delta_pct = ((mean_ms - base_mean_ms) / base_mean_ms) * 100.0
                    if mean_delta_pct > mean_delta_max_pct and mean_abs_delta_ms > mean_abs_delta_max_ms:
                      failures.append(
                        f"{name}: mean regression {mean_delta_pct:.2f}% > {mean_delta_max_pct:.2f}% "
                        f"and +{mean_abs_delta_ms:.2f}ms > +{mean_abs_delta_max_ms:.2f}ms "
                        f"(baseline {base_mean_ms:.2f}ms, current {mean_ms:.2f}ms)"
                      )
                  elif mean_abs_delta_ms > mean_abs_delta_max_ms:
                    failures.append(
                      f"{name}: mean absolute regression +{mean_abs_delta_ms:.2f}ms > +{mean_abs_delta_max_ms:.2f}ms "
                      f"for tiny baseline {base_mean_ms:.2f}ms"
                    )

                  if base_p99_ms >= baseline_min_ms:
                    p99_delta_pct = ((p99_ms - base_p99_ms) / base_p99_ms) * 100.0
                    if p99_delta_pct > p99_delta_max_pct and p99_abs_delta_ms > p99_abs_delta_max_ms:
                      failures.append(
                        f"{name}: p99 regression {p99_delta_pct:.2f}% > {p99_delta_max_pct:.2f}% "
                        f"and +{p99_abs_delta_ms:.2f}ms > +{p99_abs_delta_max_ms:.2f}ms "
                        f"(baseline {base_p99_ms:.2f}ms, current {p99_ms:.2f}ms)"
                      )
                  elif p99_abs_delta_ms > p99_abs_delta_max_ms:
                    failures.append(
                      f"{name}: p99 absolute regression +{p99_abs_delta_ms:.2f}ms > +{p99_abs_delta_max_ms:.2f}ms "
                      f"for tiny baseline {base_p99_ms:.2f}ms"
                    )

          if failures:
              print("\n🚫 PERFORMANCE GATE FAILED:")
              for f in failures:
                  print(f"  {f}")
              sys.exit(1)

          print("✅ All performance gates passed.")
          EOF

      - name: Store Python baseline benchmark artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p .benchmarks/python
          cp benchmark-results.json .benchmarks/python/base_main.json

      - name: Save Python baseline cache on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: .benchmarks/python/base_main.json
          key: python-perf-main-${{ github.sha }}

      - name: Upload benchmark results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: performance-benchmarks
          path: benchmark-results.json
