name: Performance Gate
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  performance-gate:
    name: Performance Regression Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pytest pytest-benchmark numpy
          cd sdk/python && pip install -e .

      - name: Run performance benchmarks
        run: |
          export PYTHONPATH="$PYTHONPATH:$(pwd)/sdk/python"
          pytest sdk/python/tests/test_benchmarks.py \
            --benchmark-only \
            --benchmark-json=benchmark-results.json

      - name: Performance Gate Check
        run: |
          python3 << 'EOF'
          import json
          import sys

          try:
              with open('benchmark-results.json', 'r') as f:
                  results = json.load(f)
          except FileNotFoundError:
              print("❌ benchmark-results.json not found.")
              sys.exit(1)

          thresholds = {
              'test_verify_proof_performance': {'mean_max_ms': 12.0, 'p99_max_ms': 20.0},
              'test_aggregate_nodes_performance': {'mean_max_ms': 1.0, 'p99_max_ms': 3.0},
              'test_gradient_compression_performance': {'mean_max_ms': 3.0, 'p99_max_ms': 8.0},
          }

          failures = []
          discovered = {benchmark['name'] for benchmark in results.get('benchmarks', [])}

          missing = set(thresholds.keys()) - discovered
          if missing:
              failures.append(f"Missing expected benchmarks: {', '.join(sorted(missing))}")

          for benchmark in results.get('benchmarks', []):
              name = benchmark['name']
              if name not in thresholds:
                  continue
              stats = benchmark.get('stats', {})
              mean_ms = float(stats.get('mean', 0.0)) * 1000.0
              p99_ms = float(stats.get('p99', 0.0)) * 1000.0
              limits = thresholds[name]

              if 'mean_max_ms' in limits and mean_ms > limits['mean_max_ms']:
                  failures.append(f"{name}: mean {mean_ms:.2f}ms > {limits['mean_max_ms']}ms")
              if 'p99_max_ms' in limits and p99_ms > limits['p99_max_ms']:
                  failures.append(f"{name}: p99 {p99_ms:.2f}ms > {limits['p99_max_ms']}ms")

          if failures:
              print("\n🚫 PERFORMANCE GATE FAILED:")
              for f in failures:
                  print(f"  {f}")
              sys.exit(1)

          print("✅ All performance gates passed.")
          EOF

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-benchmarks
          path: benchmark-results.json
