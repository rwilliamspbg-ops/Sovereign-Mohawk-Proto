name: Release Assets and Images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run_only:
        description: "Skip GitHub Release publish and only validate build/artifact outputs"
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GOTOOLCHAIN: go1.25.9+auto

jobs:
  prepare-release-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node (for npm package assets)
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: "22"

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: 'go.mod'

      - name: Install benchstat
        run: |
          ./scripts/go_with_toolchain.sh go install golang.org/x/perf/cmd/benchstat@latest
          echo "$(./scripts/go_with_toolchain.sh go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build benchmark reports for release bundle
        run: |
          mkdir -p release-assets/benchmarks
          chmod +x scripts/benchmark_fedavg_compare.sh
          BASE_REF=origin/main BENCH_TIME=200ms BENCH_COUNT=1 BENCH_CPU=2 USE_BENCHSTAT=always BENCHSTAT_ALPHA=0.01 \
          REPORT_PATH="release-assets/benchmarks/fedavg_benchmark_compare.md" \
          ./scripts/benchmark_fedavg_compare.sh

          python3 scripts/benchmark_accelerator_backends.py \
            --output-md release-assets/benchmarks/accelerator_backend_compare.md \
            --output-json release-assets/benchmarks/accelerator_backend_compare.json

          python3 scripts/generate_release_performance_evidence.py
          cp results/metrics/release_performance_evidence.md release-assets/benchmarks/release_performance_evidence.md

      - name: Generate source SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          format: spdx-json
          output-file: release-assets/sbom-source.spdx.json
      - name: Package npm artifacts (if present)
        run: |
          mkdir -p release-assets/npm
          mapfile -t PKG_FILES < <(find . -name package.json -not -path './node_modules/*' -not -path './sdk/python/*')
          if [ "${#PKG_FILES[@]}" -eq 0 ]; then
            echo "No npm package.json files found in this release." > release-assets/npm/npm-packages-none.txt
            exit 0
          fi

          for pkg_json in "${PKG_FILES[@]}"; do
            pkg_dir="$(dirname "$pkg_json")"
            echo "Packing npm package from $pkg_dir"
            (cd "$pkg_dir" && npm pack --pack-destination "$GITHUB_WORKSPACE/release-assets/npm")
          done

      - name: Build sovereign-map testnet tarball
        run: |
          mkdir -p release-assets
          tar -czf release-assets/sovereign-map-testnet.tar.gz \
            capabilities.json \
            bridge-policies.json \
            docker-compose.yml \
            docker-compose.full.yml \
            docker-compose.sandbox.yml \
            genesis-launch.sh \
            scripts/launch_full_stack_3_nodes.sh \
            scripts/launch_sandbox.sh \
            scripts/docker-compose-wrapper.sh \
            monitoring/prometheus/prometheus.yml \
            monitoring/prometheus/recording-rules.yml \
            monitoring/prometheus/alerting-rules.yml

      - name: Build formal verification release artifacts
        run: |
          make package-formal-verification-artifacts

      - name: Upload release prep artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-prep-assets
          retention-days: 30
          path: release-assets/

  build-and-push-release-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image_name: orchestrator
            dockerfile: cmd/orchestrator/Dockerfile
          - image_name: node-agent
            dockerfile: cmd/node-agent/Dockerfile
          - image_name: fl-aggregator
            dockerfile: cmd/fl-aggregator/Dockerfile
          - image_name: api-dashboard
            dockerfile: cmd/api-dashboard/Dockerfile
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image to GHCR
        id: build_push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/sovereign-mohawk-${{ matrix.image_name }}:${{ github.ref_name }}

      - name: Build downloadable OCI archive
        run: |
          mkdir -p release-assets/docker
          docker buildx build \
            --file "${{ matrix.dockerfile }}" \
            --tag "ghcr.io/${{ github.repository_owner }}/sovereign-mohawk-${{ matrix.image_name }}:${{ github.ref_name }}" \
            --output "type=oci,dest=release-assets/docker/${{ matrix.image_name }}-${{ github.ref_name }}.oci.tar" \
            .

      - name: Generate container image SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/${{ github.repository_owner }}/sovereign-mohawk-${{ matrix.image_name }}:${{ github.ref_name }}
          format: spdx-json
          output-file: release-assets/docker/sbom-${{ matrix.image_name }}.spdx.json
      - name: Write digest metadata
        run: |
          printf '%s\n' "${{ steps.build_push.outputs.digest }}" > release-assets/docker/${{ matrix.image_name }}-${{ github.ref_name }}.digest

      - name: Upload docker release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: docker-release-assets-${{ matrix.image_name }}
          retention-days: 30
          path: release-assets/docker/

  validate-release-bundle:
    name: Validate Release Bundle Dry Run
    runs-on: ubuntu-latest
    needs:
      - prepare-release-assets
      - build-and-push-release-images
    steps:
      - name: Download release prep assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-prep-assets
          path: release-assets

      - name: Download docker release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: docker-release-assets-*
          path: release-assets/docker
          merge-multiple: true

      - name: Validate expected release files
        run: |
          set -euo pipefail
          required=(
            "release-assets/benchmarks/fedavg_benchmark_compare.md"
            "release-assets/benchmarks/accelerator_backend_compare.md"
            "release-assets/benchmarks/release_performance_evidence.md"
            "release-assets/sbom-source.spdx.json"
            "release-assets/sovereign-map-testnet.tar.gz"
            "release-assets/formal/formal_validation_report.json"
            "release-assets/formal/formal-verification-bundle.tar.gz"
            "release-assets/formal/bundle_manifest.json"
            "release-assets/formal/sha256sums.txt"
          )
          for path in "${required[@]}"; do
            if [ ! -s "$path" ]; then
              echo "Missing expected release asset: $path"
              exit 1
            fi
          done

  publish-release:
    if: startsWith(github.ref, 'refs/tags/') && (github.event_name != 'workflow_dispatch' || inputs.dry_run_only != true)
    runs-on: ubuntu-latest
    needs:
      - prepare-release-assets
      - build-and-push-release-images
      - validate-release-bundle
    steps:
      - name: Download release prep assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-prep-assets
          path: release-assets

      - name: Download docker release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: docker-release-assets-*
          path: release-assets/docker
          merge-multiple: true

      - name: Publish release with attached artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              release-assets/benchmarks/* \
              release-assets/npm/* \
              release-assets/sbom-source.spdx.json \
              release-assets/sovereign-map-testnet.tar.gz \
              release-assets/formal/* \
              release-assets/docker/* \
              --clobber
          else
            gh release create "$TAG" \
              release-assets/benchmarks/* \
              release-assets/npm/* \
              release-assets/sbom-source.spdx.json \
              release-assets/sovereign-map-testnet.tar.gz \
              release-assets/formal/* \
              release-assets/docker/* \
              --generate-notes
          fi
