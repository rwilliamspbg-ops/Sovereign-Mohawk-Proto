name: Deploy static content to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: true
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d
      - name: Prepare deploy metadata
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::12}"
          BUILD_TIME_UTC="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          printf "%s\n" "${GITHUB_SHA}" > .build-sha.txt
          printf "%s\n" "${BUILD_TIME_UTC}" > .build-time-utc.txt
          cat > .build-metadata.json <<EOF
          {
            "sha": "${GITHUB_SHA}",
            "sha_short": "${SHORT_SHA}",
            "built_at_utc": "${BUILD_TIME_UTC}",
            "run_id": "${GITHUB_RUN_ID}",
            "run_number": "${GITHUB_RUN_NUMBER}",
            "run_attempt": "${GITHUB_RUN_ATTEMPT}"
          }
          EOF
          touch .nojekyll
      - name: Validate deploy metadata files
        run: |
          set -euo pipefail
          test -s .build-sha.txt
          test -s .build-time-utc.txt
          test -s .build-metadata.json
          grep -q '"sha"' .build-metadata.json
          grep -q '"built_at_utc"' .build-metadata.json
          grep -q '"run_number"' .build-metadata.json
      - name: Log deploy metadata for audit trail
        run: |
          set -euo pipefail
          echo "Deploy metadata JSON:"
          cat .build-metadata.json
          echo ""
          echo "Deploy metadata SHA-256:"
          sha256sum .build-metadata.json
      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
