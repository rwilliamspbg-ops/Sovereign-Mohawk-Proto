name: Security Scanning - Containers & Dependencies

on:
  push:
    branches: [ main, "improvements/**" ]
    paths:
      - 'Dockerfile'
      - 'cmd/**/Dockerfile'
      - 'go.mod'
      - 'go.sum'
      - 'sdk/python/requirements.txt'
      - '.github/workflows/security-scanning.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'Dockerfile'
      - 'cmd/**/Dockerfile'
      - 'go.mod'
      - 'go.sum'
      - 'sdk/python/requirements.txt'
  schedule:
    - cron: '0 2 * * 0'  # Weekly scan on Sunday at 2 AM UTC

jobs:
  trivy-scan-dockerfile:
    name: Trivy - Dockerfile Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      
      - name: Run Trivy vulnerability scanner (Dockerfile)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: 'config'
          scan-ref: 'Dockerfile'
          format: 'sarif'
          output: 'trivy-dockerfile-results.sarif'
          severity: 'CRITICAL,HIGH'
      
      - name: Upload Trivy Dockerfile results to GitHub Security
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7
        if: always()
        with:
          sarif_file: 'trivy-dockerfile-results.sarif'
          category: 'trivy-dockerfile'

  trivy-scan-image:
    name: Trivy - Container Image Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
      
      - name: Build Docker image for scanning
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: sovereign-mohawk:test
      
      - name: Run Trivy vulnerability scanner (Container Image)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: 'sovereign-mohawk:test'
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          severity: 'CRITICAL,HIGH'
      
      - name: Upload Trivy image results to GitHub Security
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7
        if: always()
        with:
          sarif_file: 'trivy-image-results.sarif'
          category: 'trivy-image'

  govulncheck:
    name: Go - Vulnerability Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: '1.26'
      
      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... || true

  python-security:
    name: Python - Bandit Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.11'
      
      - name: Install Bandit
        run: pip install bandit[toml]
      
      - name: Run Bandit security scan
        run: |
          bandit -r sdk/python scripts --format json -o bandit-results.json || true

  publish-scan-results:
    name: Publish Security Scan Summary
    runs-on: ubuntu-latest
    needs: [trivy-scan-dockerfile, trivy-scan-image, govulncheck, python-security]
    if: always()
    
    steps:
      - name: Create security scan summary
        run: |
          echo "## Security Scanning Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Scans Completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Trivy Dockerfile scan" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Trivy container image scan" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Go vulnerability check (govulncheck)" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Python security scan (Bandit)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Severity Thresholds" >> $GITHUB_STEP_SUMMARY
          echo "- CRITICAL: Informational only on improvement branches" >> $GITHUB_STEP_SUMMARY
          echo "- HIGH: Informational only on improvement branches" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Note:** Detailed results available in GitHub Security tab → Code scanning" >> $GITHUB_STEP_SUMMARY
