name: Security Scanning - Containers & Dependencies

on:
  push:
    branches: [ main, "improvements/**" ]
    paths:
      - 'Dockerfile'
      - 'cmd/**/Dockerfile'
      - 'go.mod'
      - 'go.sum'
      - 'sdk/python/requirements.txt'
      - '.github/workflows/security-scanning.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'Dockerfile'
      - 'cmd/**/Dockerfile'
      - 'go.mod'
      - 'go.sum'
      - 'sdk/python/requirements.txt'
  schedule:
    - cron: '0 2 * * 0'  # Weekly scan on Sunday at 2 AM UTC

jobs:
  trivy-scan-dockerfile:
    name: Trivy - Dockerfile Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      
      - name: Run Trivy vulnerability scanner (Dockerfile)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: 'Dockerfile'
          format: 'sarif'
          output: 'trivy-dockerfile-results.sarif'
          severity: 'CRITICAL,HIGH'
      
      - name: Upload Trivy Dockerfile results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-dockerfile-results.sarif'
          category: 'trivy-dockerfile'

  trivy-scan-image:
    name: Trivy - Container Image Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: sovereign-mohawk:test
      
      - name: Run Trivy vulnerability scanner (Container Image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'sovereign-mohawk:test'
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          severity: 'CRITICAL,HIGH'
      
      - name: Upload Trivy image results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-image-results.sarif'
          category: 'trivy-image'

  dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      
      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'Sovereign-Mohawk'
          path: '.'
          format: 'SARIF'
          args: |
            --scan .
            --exclude node_modules
            --exclude test
            --exclude .git
      
      - name: Upload Dependency-Check results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'dependency-check-report.sarif'
          category: 'dependency-check'

  govulncheck:
    name: Go - Vulnerability Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'
      
      - name: Run govulncheck
        run: |
          go install github.com/golang/vuln/cmd/govulncheck@latest
          govulncheck ./...
      
      - name: Generate govulncheck SARIF (if vulnerabilities found)
        if: failure()
        run: |
          govulncheck -json ./... | jq '.' > govulncheck-results.json
      
      - name: Publish govulncheck results
        if: failure()
        run: |
          echo "Go vulnerability check found issues. See details above."
          exit 1

  python-security:
    name: Python - Bandit Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install Bandit
        run: pip install bandit[toml]
      
      - name: Run Bandit security scan
        run: |
          bandit -r sdk/python scripts --format json -o bandit-results.json || true
      
      - name: Convert Bandit to SARIF
        run: |
          pip install sarif-python-om
          python -m bandit -r sdk/python scripts --format sarif -o bandit-results.sarif || true
      
      - name: Upload Bandit results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'bandit-results.sarif'
          category: 'bandit'

  publish-scan-results:
    name: Publish Security Scan Summary
    runs-on: ubuntu-latest
    needs: [trivy-scan-dockerfile, trivy-scan-image, dependency-check, govulncheck, python-security]
    if: always()
    
    steps:
      - name: Create security scan summary
        run: |
          echo "## Security Scanning Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Scans Completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Trivy Dockerfile scan" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Trivy container image scan" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ OWASP Dependency-Check" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Go vulnerability check (govulncheck)" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Python security scan (Bandit)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Severity Thresholds" >> $GITHUB_STEP_SUMMARY
          echo "- CRITICAL: 0 allowed" >> $GITHUB_STEP_SUMMARY
          echo "- HIGH: 0 allowed (on main branch)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Note:** Detailed results available in GitHub Security tab → Code scanning">> $GITHUB_STEP_SUMMARY
