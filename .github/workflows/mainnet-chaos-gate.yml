name: Mainnet Chaos Gate

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 */12 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  chaos-gate:
    name: Chaos Readiness (${{ matrix.scenario }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        scenario: [tpm-metrics, orchestrator, prometheus, grafana]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Prepare runtime secrets
        run: |
          mkdir -p runtime-secrets
          if [ ! -s runtime-secrets/mohawk_api_token ]; then
            python3 -c 'import secrets, pathlib; pathlib.Path("runtime-secrets/mohawk_api_token").write_text(secrets.token_hex(24), encoding="utf-8")'
          fi
          if [ ! -s runtime-secrets/mohawk_tpm_ca_cert.pem ] || [ ! -s runtime-secrets/mohawk_tpm_ca_key.pem ]; then
            openssl req -x509 -newkey rsa:3072 \
              -keyout runtime-secrets/mohawk_tpm_ca_key.pem \
              -out runtime-secrets/mohawk_tpm_ca_cert.pem \
              -sha256 -days 365 -nodes \
              -subj "/CN=Sovereign-Mohawk TPM Root/O=Sovereign-Mohawk" >/dev/null 2>&1
          fi

      - name: Start monitoring stack
        run: |
          docker compose up -d --build orchestrator prometheus tpm-metrics pyapi-metrics-exporter grafana

      - name: Run chaos readiness drill
        run: |
          RECOVERY_LATENCY_MAX_SECONDS=120 bash scripts/chaos_readiness_drill.sh "${{ matrix.scenario }}" chaos-reports

      - name: Upload chaos reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: mainnet-chaos-report-${{ matrix.scenario }}
          path: chaos-reports/*.json

      - name: Stop stack
        if: always()
        run: |
          docker compose down -v
