name: Anti-Regression

on:
  push:
    paths: ['**.go', 'go.mod']

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Complexity Benchmark
        run: go test -bench=. -benchmem ./...
