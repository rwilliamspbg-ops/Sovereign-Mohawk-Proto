name: Go Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  go-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'

      - name: Run Go tests
        run: |
          mkdir -p test-results
          source scripts/ensure_go_toolchain.sh
          set -o pipefail
          go test -json ./... | tee test-results/go-test-report.jsonl

      - name: Upload Go test artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: go-test-report
          path: test-results/go-test-report.jsonl
