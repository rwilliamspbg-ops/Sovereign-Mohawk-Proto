name: Go Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GOTOOLCHAIN: go1.25.9+auto

jobs:
  go-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: 'go.mod'

      - name: Run Go tests
        run: |
          mkdir -p test-results
          source scripts/ensure_go_toolchain.sh
          set -o pipefail
          go test -json -covermode=atomic -coverprofile=test-results/go-coverage.out ./... | tee test-results/go-test-report.jsonl
          go tool cover -func=test-results/go-coverage.out > test-results/go-coverage-summary.txt

      - name: Upload Go test artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: go-test-report
          path: |
            test-results/go-test-report.jsonl
            test-results/go-coverage.out
            test-results/go-coverage-summary.txt
