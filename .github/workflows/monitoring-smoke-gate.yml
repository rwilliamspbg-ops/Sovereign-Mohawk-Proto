name: Monitoring Smoke Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  monitoring-smoke:
    name: Grafana and Prometheus Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Prepare runtime secrets
        run: |
          mkdir -p runtime-secrets
          if [ ! -s runtime-secrets/mohawk_api_token ]; then
            python3 -c 'import os, pathlib, secrets; p = pathlib.Path("runtime-secrets/mohawk_api_token"); p.write_text(secrets.token_hex(24), encoding="utf-8"); os.chmod(p, 0o600)'
          fi
          if [ ! -s runtime-secrets/mohawk_tpm_ca_cert.pem ] || [ ! -s runtime-secrets/mohawk_tpm_ca_key.pem ]; then
            openssl req -x509 -newkey rsa:3072 \
              -keyout runtime-secrets/mohawk_tpm_ca_key.pem \
              -out runtime-secrets/mohawk_tpm_ca_cert.pem \
              -sha256 -days 365 -nodes \
              -subj "/CN=Sovereign-Mohawk TPM Root/O=Sovereign-Mohawk" >/dev/null 2>&1
          fi

      - name: Start monitoring stack
        run: |
          docker compose up -d --build orchestrator prometheus tpm-metrics pyapi-metrics-exporter grafana

      - name: Wait for Prometheus and Grafana
        run: |
          for _ in $(seq 1 60); do
            if curl -fsS http://localhost:9090/-/healthy >/dev/null 2>&1 && curl -fsS http://localhost:3000/api/health >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo "Prometheus/Grafana did not become healthy in time"
          exit 1

      - name: Verify Prometheus targets
        run: |
          python3 - <<'PY'
          import json
          import time
          import urllib.parse
          import urllib.request
          from pathlib import Path

          endpoint = "http://localhost:9090/api/v1/query"
          query = urllib.parse.urlencode({"query": 'up{job=~"orchestrator|tpm-metrics|pyapi-exporter"}'})
          url = f"{endpoint}?{query}"

          last_payload = None
          for _ in range(90):
            with urllib.request.urlopen(url, timeout=10) as resp:
              payload = json.loads(resp.read().decode("utf-8"))
            last_payload = payload
            results = payload.get("data", {}).get("result", [])
            if results:
              down = [r for r in results if r.get("value", ["", "0"])[1] != "1"]
              if not down:
                Path('/tmp/up.json').write_text(json.dumps(payload), encoding='utf-8')
                print(f"All targets up: {len(results)}")
                raise SystemExit(0)
            time.sleep(2)

          if last_payload is not None:
            Path('/tmp/up.json').write_text(json.dumps(last_payload), encoding='utf-8')
            results = last_payload.get("data", {}).get("result", [])
            if not results:
              raise SystemExit("No Prometheus up samples found")
            down = [r for r in results if r.get("value", ["", "0"])[1] != "1"]
            raise SystemExit(f"Found down targets: {down}")
          raise SystemExit("Prometheus query did not return a payload")
          PY

      - name: Verify key query families return data
        run: |
          python3 - <<'PY'
          import json
          import time
          import urllib.parse
          import urllib.request
          from pathlib import Path

          endpoint = "http://localhost:9090/api/v1/query"
          checks = {
              "mohawk_metrics_family": "count({__name__=~\"mohawk_.*\"})",
              "tpm_metrics_family": "count({__name__=~\"mohawk_tpm_.*\"})",
          }

          output = {}
          missing = []
          for key, query_expr in checks.items():
              url = f"{endpoint}?" + urllib.parse.urlencode({"query": query_expr})
              result_count = 0
              payload = None
              for _ in range(90):
                  with urllib.request.urlopen(url, timeout=10) as resp:
                      payload = json.loads(resp.read().decode("utf-8"))
                  result_count = len(payload.get("data", {}).get("result", []))
                  if result_count > 0:
                      break
                  time.sleep(2)

              output[key] = {
                  "query": query_expr,
                  "result_count": result_count,
                  "payload": payload,
              }
              if result_count == 0:
                  missing.append(key)

          Path('/tmp/key_query_results.json').write_text(json.dumps(output), encoding='utf-8')
          if missing:
              raise SystemExit(f"Missing data for key query families: {missing}")
          print("Key query families populated:", ", ".join(sorted(checks.keys())))
          PY

      - name: Verify v2 dashboard registration
        run: |
          curl -fsS -u admin:admin 'http://localhost:3000/api/search?type=dash-db' > /tmp/grafana_dashboards.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          dashboards = json.loads(Path('/tmp/grafana_dashboards.json').read_text(encoding='utf-8'))
          wanted = {
            'Sovereign Mohawk | Start Here',
            'Sovereign Mohawk | Operations Overview',
            'Sovereign Mohawk | Operations Incidents',
            'Sovereign Mohawk | Security & PQC Compliance',
          }
          titles = {d.get('title') for d in dashboards if d.get('title')}
          missing = sorted(wanted - titles)
          if missing:
            raise SystemExit(f'Missing dashboards: {missing}')
          print('Dashboards present:', ', '.join(sorted(wanted)))
          PY

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: monitoring-smoke-artifacts
          path: |
            /tmp/up.json
            /tmp/grafana_dashboards.json
            /tmp/key_query_results.json

      - name: Stop stack
        if: always()
        run: |
          docker compose down -v
