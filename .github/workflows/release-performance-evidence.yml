name: Release Performance Evidence

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release-performance-evidence:
    name: Build Performance Evidence Index
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Build SDK benchmark artifact
        run: |
          pip install pytest pytest-benchmark numpy
          cd sdk/python && pip install -e .
          cd ../..
          pytest sdk/python/tests/test_benchmarks.py --benchmark-only --benchmark-json=benchmark-results.json

      - name: Build bridge benchmark report
        run: |
          chmod +x scripts/benchmark_bridge_compression_compare.sh
          BENCH_TIME=100ms ./scripts/benchmark_bridge_compression_compare.sh

      - name: Build FedAvg benchmark report
        run: |
          chmod +x scripts/benchmark_fedavg_compare.sh
          BASE_REF=origin/main BENCH_TIME=100ms BENCH_COUNT=1 REPORT_PATH=results/metrics/fedavg_benchmark_compare.md ./scripts/benchmark_fedavg_compare.sh

      - name: Generate release performance evidence index
        run: |
          python3 scripts/generate_release_performance_evidence.py

      - name: Verify required evidence bundle files
        run: |
          set -euo pipefail
          required=(
            "benchmark-results.json"
            "results/metrics/bridge_compression_benchmark_compare.md"
            "results/metrics/bridge_compression_benchmark_raw.txt"
            "results/metrics/fedavg_benchmark_compare.md"
            "results/metrics/release_performance_evidence.md"
          )
          for path in "${required[@]}"; do
            if [ ! -s "$path" ]; then
              echo "Missing required evidence file: $path"
              exit 1
            fi
          done

      - name: Upload release evidence artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-performance-evidence
          retention-days: 30
          path: |
            benchmark-results.json
            results/metrics/bridge_compression_benchmark_compare.md
            results/metrics/bridge_compression_benchmark_raw.txt
            results/metrics/fedavg_benchmark_compare.md
            results/metrics/release_performance_evidence.md

  validate-evidence-bundle:
    name: Validate Evidence Dry Run Bundle
    runs-on: ubuntu-latest
    needs: release-performance-evidence
    steps:
      - name: Download release evidence artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-performance-evidence
          path: release-performance-evidence

      - name: Validate expected downloaded files
        run: |
          set -euo pipefail
          required=(
            "release-performance-evidence/benchmark-results.json"
            "release-performance-evidence/bridge_compression_benchmark_compare.md"
            "release-performance-evidence/bridge_compression_benchmark_raw.txt"
            "release-performance-evidence/fedavg_benchmark_compare.md"
            "release-performance-evidence/release_performance_evidence.md"
          )
          for path in "${required[@]}"; do
            if [ ! -s "$path" ]; then
              echo "Missing required downloaded file: $path"
              exit 1
            fi
          done

  publish-release-evidence:
    name: Attach Performance Evidence to Release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs:
      - release-performance-evidence
      - validate-evidence-bundle
    steps:
      - name: Download release evidence artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-performance-evidence
          path: release-performance-evidence

      - name: Attach evidence artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release upload "$TAG" \
            release-performance-evidence/benchmark-results.json \
            release-performance-evidence/bridge_compression_benchmark_compare.md \
            release-performance-evidence/bridge_compression_benchmark_raw.txt \
            release-performance-evidence/fedavg_benchmark_compare.md \
            release-performance-evidence/release_performance_evidence.md \
            --clobber

      - name: Append performance evidence summary to release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          NOTES_FILE="release-notes-updated.md"
          SECTION_FILE="performance-evidence-section.md"

          cat > "$SECTION_FILE" <<'EOF'
          ## Performance Evidence

          - [Release performance index](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/results/metrics/release_performance_evidence.md)
          - [FedAvg benchmark compare](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/results/metrics/fedavg_benchmark_compare.md)
          - [Bridge compression benchmark](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/results/metrics/bridge_compression_benchmark_compare.md)
          EOF

          body="$(gh release view "$TAG" --json body --jq .body)"
          if echo "$body" | grep -q "## Performance Evidence"; then
            echo "Performance evidence section already exists in release notes."
            exit 0
          fi

          printf "%s\n\n" "$body" > "$NOTES_FILE"
          cat "$SECTION_FILE" >> "$NOTES_FILE"
          gh release edit "$TAG" --notes-file "$NOTES_FILE"
