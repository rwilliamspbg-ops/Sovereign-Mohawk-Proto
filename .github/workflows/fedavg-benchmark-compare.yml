name: FedAvg Benchmark Compare

"on":
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '30 4 * * 1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GOTOOLCHAIN: go1.25.9+auto
  FEDAVG_BENCH_TIME: "300ms"
  FEDAVG_BENCH_COUNT: "10"
  FEDAVG_BENCH_CPU: "2"
  FEDAVG_BENCHSTAT_ALPHA: "0.01"
  FEDAVG_REGRESSION_THRESHOLD_PCT: "5.0"

jobs:
  swarm-integration-suite:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Enforce required Go toolchain mode
        run: echo "GOTOOLCHAIN=go1.25.9+auto" >> "$GITHUB_ENV"

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: 'go.mod'

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.12'

      - name: Run large-scale swarm + Byzantine edge integration suite
        run: |
          mkdir -p test-results
          set -o pipefail
          ./scripts/go_with_toolchain.sh go test -json ./test -run 'TestSwarmIntegration500To1000Nodes|TestByzantineEdgeCasesOver55PercentMalicious|TestHardwareAgnosticBackendProfiles' | tee test-results/swarm-integration-go-test.jsonl

      - name: Build CPU vs GPU vs NPU benchmark report
        run: |
          mkdir -p results/metrics
          python3 scripts/benchmark_accelerator_backends.py \
            --output-md results/metrics/accelerator_backend_compare.md \
            --output-json results/metrics/accelerator_backend_compare.json

      - name: Upload swarm integration artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: swarm-integration-artifacts
          path: |
            test-results/swarm-integration-go-test.jsonl
            results/metrics/accelerator_backend_compare.md
            results/metrics/accelerator_backend_compare.json

  fedavg-baseline-main:
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'schedule'
    needs: swarm-integration-suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Enforce required Go toolchain mode
        run: echo "GOTOOLCHAIN=go1.25.9+auto" >> "$GITHUB_ENV"

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: 'go.mod'

      - name: Capture FedAvg benchmark baseline on main
        run: |
          mkdir -p .benchmarks/fedavg
          ./scripts/go_with_toolchain.sh go test ./test -run '^$' -bench '^BenchmarkAggregateParallel$' -benchmem -benchtime="${FEDAVG_BENCH_TIME}" -count="${FEDAVG_BENCH_COUNT}" -cpu="${FEDAVG_BENCH_CPU}" > .benchmarks/fedavg/base_main.txt

      - name: Save baseline in GitHub Actions cache
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: .benchmarks/fedavg/base_main.txt
          key: fedavg-main-${{ github.sha }}

      - name: Upload FedAvg baseline artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: fedavg-baseline-main
          path: .benchmarks/fedavg/base_main.txt

  fedavg-benchmark-compare:
    if: github.event_name == 'pull_request'
    needs: swarm-integration-suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Enforce required Go toolchain mode
        run: echo "GOTOOLCHAIN=go1.25.9+auto" >> "$GITHUB_ENV"

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: 'go.mod'

      - name: Install benchstat
        run: |
          ./scripts/go_with_toolchain.sh go install golang.org/x/perf/cmd/benchstat@latest
          echo "$(./scripts/go_with_toolchain.sh go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Detect performance-impacting changes
        id: perf_changes
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          git fetch --no-tags origin "$BASE_SHA" "$HEAD_SHA"

          if git merge-base "$BASE_SHA" "$HEAD_SHA" >/dev/null 2>&1; then
            CHANGED_FILES="$(git diff --name-only "$BASE_SHA...$HEAD_SHA")"
          else
            echo "warning: no merge base for $BASE_SHA and $HEAD_SHA; using two-dot diff fallback"
            CHANGED_FILES="$(git diff --name-only "$BASE_SHA..$HEAD_SHA")"
          fi

          echo "$CHANGED_FILES"

          if echo "$CHANGED_FILES" | grep -Eq '^(cmd/|internal/|node/|src/|test/|scripts/benchmark_fedavg_compare\.sh$|scripts/go_with_toolchain\.sh$|go\.mod$|go\.sum$)'; then
            echo "run_benchmark=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_benchmark=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore FedAvg baseline cache from main
        if: steps.perf_changes.outputs.run_benchmark == 'true'
        id: restore-fedavg-cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: .benchmarks/fedavg/base_main.txt
          key: fedavg-main-${{ github.sha }}
          restore-keys: |
            fedavg-main-

      - name: Require cached baseline
        if: steps.perf_changes.outputs.run_benchmark == 'true'
        run: |
          if [ ! -s .benchmarks/fedavg/base_main.txt ]; then
            echo "error: missing cached FedAvg baseline from main"
            echo "hint: run this workflow on main to seed fedavg-main-* cache"
            exit 1
          fi

      - name: Run current FedAvg benchmark
        if: steps.perf_changes.outputs.run_benchmark == 'true'
        run: |
          mkdir -p .benchmarks/fedavg
          ./scripts/go_with_toolchain.sh go test ./test -run '^$' -bench '^BenchmarkAggregateParallel$' -benchmem -benchtime="${FEDAVG_BENCH_TIME}" -count="${FEDAVG_BENCH_COUNT}" -cpu="${FEDAVG_BENCH_CPU}" > .benchmarks/fedavg/current_pr.txt

      - name: Verify expected benchmark symbols
        if: steps.perf_changes.outputs.run_benchmark == 'true'
        run: |
          set -euo pipefail
          grep -q '^BenchmarkAggregateParallel/' .benchmarks/fedavg/base_main.txt || { echo "error: expected BenchmarkAggregateParallel rows missing in baseline"; exit 1; }
          grep -q '^BenchmarkAggregateParallel/' .benchmarks/fedavg/current_pr.txt || { echo "error: expected BenchmarkAggregateParallel rows missing in current benchmark"; exit 1; }

      - name: Build FedAvg benchmark comparison report
        if: steps.perf_changes.outputs.run_benchmark == 'true'
        run: |
          mkdir -p results/metrics
          benchstat -alpha "${FEDAVG_BENCHSTAT_ALPHA}" .benchmarks/fedavg/base_main.txt .benchmarks/fedavg/current_pr.txt > .benchmarks/fedavg/benchstat.txt
          {
            echo "# FedAvg Benchmark Comparison"
            echo
            echo "- Baseline source: cached main benchmark"
            echo "- Baseline cache key prefix: fedavg-main-"
            echo "- PR ref: ${{ github.head_ref }}"
            echo "- Alpha: ${FEDAVG_BENCHSTAT_ALPHA}"
            echo "- Regression fail threshold: +${FEDAVG_REGRESSION_THRESHOLD_PCT}% geomean sec/op"
            echo
            echo '```text'
            cat .benchmarks/fedavg/benchstat.txt
            echo '```'
          } > results/metrics/fedavg_benchmark_compare.md

      - name: Write skipped benchmark report
        if: steps.perf_changes.outputs.run_benchmark != 'true'
        run: |
          mkdir -p results/metrics
          {
            echo "# FedAvg Benchmark Comparison"
            echo
            echo "Benchmark gate skipped because no performance-impacting paths changed in this PR."
            echo
            echo "Paths considered performance-impacting: cmd/, internal/, node/, src/, test/, go.mod, go.sum"
          } > results/metrics/fedavg_benchmark_compare.md

      - name: Enforce FedAvg regression threshold
        if: steps.perf_changes.outputs.run_benchmark == 'true'
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          threshold = float(os.environ["FEDAVG_REGRESSION_THRESHOLD_PCT"])
          text = Path(".benchmarks/fedavg/benchstat.txt").read_text(encoding="utf-8")

          in_time_block = False
          delta = None
          for line in text.splitlines():
            if "delta" in line and ("sec/op" in line or "ns/op" in line or "time/op" in line):
              in_time_block = True
              continue
            if in_time_block and line.strip().startswith("geomean"):
              m = re.search(r"([+-]?[0-9]+(?:\.[0-9]+)?)%", line)
              if m:
                delta = float(m.group(1))
              break

          if delta is None:
            # Fallback: accept first geomean percentage if table headers differ.
            for line in text.splitlines():
              if line.strip().startswith("geomean"):
                m = re.search(r"([+-]?[0-9]+(?:\.[0-9]+)?)%", line)
                if m:
                  delta = float(m.group(1))
                  break

          if delta is None:
            print("error: unable to parse geomean regression from benchstat output")
            raise SystemExit(1)

          print(f"parsed geomean sec/op delta: {delta:.2f}% (threshold: +{threshold:.2f}%)")
          if delta > threshold:
            print("error: FedAvg regression threshold exceeded")
            raise SystemExit(1)
          PY

      - name: Upload FedAvg benchmark report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: fedavg-benchmark-report
          path: |
            results/metrics/fedavg_benchmark_compare.md
            .benchmarks/fedavg/benchstat.txt
            .benchmarks/fedavg/base_main.txt
            .benchmarks/fedavg/current_pr.txt
