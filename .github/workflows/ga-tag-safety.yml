name: GA Tag Safety

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  ga-tag-safety:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Enforce GA tag safety
        run: |
          python3 scripts/enforce_ga_tag_safety.py --tag "${GITHUB_REF_NAME}"
