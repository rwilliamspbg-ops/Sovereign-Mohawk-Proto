name: Mainnet Readiness Gate

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 */12 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  readiness-gate:
    name: Mainnet Readiness Invariants
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Advisory host UDP/sysctl preflight (non-blocking)
        run: |
          chmod +x scripts/validate_host_network_tuning.sh
          if ! ./scripts/validate_host_network_tuning.sh; then
            echo "::warning::Host UDP/sysctl tuning is below production target on this runner (advisory only)."
          fi

      - name: Prepare runtime secrets
        run: |
          mkdir -p runtime-secrets
          if [ ! -s runtime-secrets/mohawk_api_token ]; then
            python3 -c 'import secrets, pathlib; pathlib.Path("runtime-secrets/mohawk_api_token").write_text(secrets.token_hex(24), encoding="utf-8")'
          fi
          if [ ! -s runtime-secrets/mohawk_tpm_ca_cert.pem ] || [ ! -s runtime-secrets/mohawk_tpm_ca_key.pem ]; then
            openssl req -x509 -newkey rsa:3072 \
              -keyout runtime-secrets/mohawk_tpm_ca_key.pem \
              -out runtime-secrets/mohawk_tpm_ca_cert.pem \
              -sha256 -days 365 -nodes \
              -subj "/CN=Sovereign-Mohawk TPM Root/O=Sovereign-Mohawk" >/dev/null 2>&1
          fi

      - name: Start monitoring stack
        run: |
          docker compose up -d --build orchestrator prometheus tpm-metrics pyapi-metrics-exporter grafana

      - name: Run mainnet readiness checks
        run: |
          python3 scripts/mainnet_readiness_gate.py \
            --retries 60 \
            --delay 2 \
            --min-bridge-transfers 1 \
            --min-proof-verifications 1 \
            --min-hybrid-verifications 1 \
            > readiness-report.json || status=$?
          cat readiness-report.json
          if [ -n "${status:-}" ]; then
            exit "$status"
          fi

      - name: Upload readiness report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: mainnet-readiness-report
          path: readiness-report.json

      - name: Stop stack
        if: always()
        run: |
          docker compose down -v
