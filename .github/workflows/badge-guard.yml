name: Badge Guard
on:
  push:
    paths: ['README.md']
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          grep -oE "workflows/[a-zA-Z0-9._-]+/badge.svg" README.md | while read -r line ; do
            FILE=$(echo $line | cut -d'/' -f2)
            [ -f ".github/workflows/$FILE" ] || (echo "Missing: $FILE" && exit 1)
          done
