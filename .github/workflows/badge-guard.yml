name: Badge Guard

on:
  push:
    paths: ['README.md', '.github/workflows/**']
  workflow_dispatch:

jobs:
  validate-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cross-Reference Badges
        run: |
          # Verify every workflow badge in README points to a real file
          grep -oE "workflows/[a-zA-Z0-9._-]+/badge.svg" README.md | while read -r line ; do
            FILE=$(echo $line | cut -d'/' -f2)
            if [ ! -f ".github/workflows/$FILE" ]; then
              echo "::error::Dead Link Found: $FILE"
              exit 1
            fi
          done
          echo "All associations verified."
