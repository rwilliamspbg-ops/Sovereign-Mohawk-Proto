name: Badge Guard

on:
  push:
    paths: ['README.md']

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify Dashboard Associations
        run: |
          # Ensure every workflow badge in the README has a matching file
          grep -oE "workflows/[a-zA-Z0-9._-]+/badge.svg" README.md | while read -r line ; do
            FILE=$(echo $line | cut -d'/' -f2)
            if [ ! -f ".github/workflows/$FILE" ]; then
              echo "::error::Broken association found: $FILE"
              exit 1
            fi
          done
