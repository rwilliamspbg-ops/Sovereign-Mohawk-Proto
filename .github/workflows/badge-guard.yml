name: Badge Guard

on:
  push:
    paths: ['README.md', '.github/workflows/**']

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Audit Associations
        run: |
          # Verify the 5 core workflows exist as linked in README
          for file in main.yml anti-regression.yml lint.yml badge-guard.yml; do
            if [ ! -f ".github/workflows/$file" ]; then
              echo "::error::Missing $file - check your associations!"
              exit 1
            fi
          done
