name: Badge Guard

on:
  push:
    paths: ['README.md']

jobs:
  verify-associations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Audit Dashboard Links
        run: |
          # Verify the 4 primary local workflow files exist
          for f in main.yml badge-guard.yml lint.yml anti-regression.yml; do
            if [ ! -f ".github/workflows/$f" ]; then
              echo "::error::Missing Workflow Association: $f"
              exit 1
            fi
          done
          echo "All associations verified for Sovereign Mohawk."
