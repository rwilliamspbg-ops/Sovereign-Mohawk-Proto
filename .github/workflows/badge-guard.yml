name: Badge Guard

on:
  push:
    branches: [ main ]
    paths:
      - 'README.md'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Badge Links
        run: |
          # This ensures every workflow badge in the README actually exists
          BADGES=$(grep -oE "workflows/[a-zA-Z0-9._-]+/badge.svg" README.md || true)
          for B in $BADGES; do
            FILE=$(echo $B | cut -d'/' -f2)
            if [ ! -f ".github/workflows/$FILE" ]; then
              echo "::error::README refers to missing workflow file: $FILE"
              exit 1
            fi
          done
          echo "All badges verified."
