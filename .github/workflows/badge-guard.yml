- name: Auto-Fix Badge Links
        if: github.event_name == 'push'
        run: |
          # This regex finds workflow badge URLs and ensures they match actual files
          # Note: This is a basic version; for production, use a dedicated Action
          sed -i 's/verify.yml/main.yml/g' README.md
          sed -i 's/performance.yml/main.yml/g' README.md
          
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git commit -m "docs: auto-fix broken badge references" || echo "No changes to commit"
          git push
