name: Badge Guard

on:
  push:
    branches: [ main ]
    paths:
      - 'README.md'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  validate-integrity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan Badge Links
        run: |
          # Finds all workflow badges and checks if the file actually exists
          grep -oE "workflows/[a-zA-Z0-9._-]+/badge.svg" README.md | while read -r line ; do
            FILE=$(echo $line | cut -d'/' -f2)
            if [ ! -f ".github/workflows/$FILE" ]; then
              echo "::error::README points to missing workflow: $FILE"
              exit 1
            fi
          done
          echo "Integrity Verified: All badges operational."
