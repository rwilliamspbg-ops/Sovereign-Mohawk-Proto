name: Badge Guard & Link Validator

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write  # This is the missing piece allowing the fix

jobs:
  validate-and-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto-Fix README Badge Paths
        run: |
          # Replace deleted workflow references with active ones
          sed -i 's/verify.yml/main.yml/g' README.md
          sed -i 's/performance.yml/main.yml/g' README.md
          
          # Configure Git for the runner
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Only commit if there are changes
          if [[ -n $(git status -s) ]]; then
            git add README.md
            git commit -m "docs: sync badges with active workflows"
            git push
          else
            echo "No broken references found. README is clean."
          fi

      - name: Final Integrity Check
        run: |
          # Verify all workflow badges in README actually exist in the repo
          BADGES=$(grep -oE "workflows/[a-zA-Z0-9._-]+/badge.svg" README.md || true)
          for B in $BADGES; do
            FILE=$(echo $B | cut -d'/' -f2)
            if [ ! -f ".github/workflows/$FILE" ]; then
              echo "::error::README badge points to non-existent file: $FILE"
              exit 1
            fi
          done
