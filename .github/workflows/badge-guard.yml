name: Badge Guard & Link Validator

on:
  push:
    branches: [ main ]
    paths:
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Clean Badges
        run: |
          # Replace all known broken workflow references
          sed -i 's/verify.yml/main.yml/g' README.md
          sed -i 's/performance.yml/main.yml/g' README.md
          
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          if [[ -n $(git status -s) ]]; then
            git add README.md
            git commit -m "docs: auto-fix badges [skip ci]"
            git push
          fi
