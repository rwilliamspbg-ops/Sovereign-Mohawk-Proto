name: Badge Guard & Link Validator

on:
  push:
    branches: [ main ]
    paths:
      - 'README.md' # Only run when README changes to save resources
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-and-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Auto-Fix README
        run: |
          # Fix common naming mismatches
          sed -i 's/verify.yml/main.yml/g' README.md
          sed -i 's/performance.yml/main.yml/g' README.md
          
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          if [[ -n $(git status -s) ]]; then
            git add README.md
            # [skip ci] is the magic key to stop the infinite loop
            git commit -m "docs: auto-fix badges [skip ci]"
            git push
          fi

      - name: Verify Existing Workflows
        run: |
          # Only check for files that SHOULD exist in .github/workflows
          for f in main.yml badge-guard.yml; do
            if [ ! -f ".github/workflows/$f" ]; then
              echo "::error::Missing critical workflow file: $f"
              exit 1
            fi
          done
