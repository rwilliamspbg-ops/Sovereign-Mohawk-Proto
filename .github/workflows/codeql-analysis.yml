name: CodeQL Security Analysis

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '30 4 * * 2'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  analyze:
    name: Analyze (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ 'go', 'python' ]
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Go
        if: matrix.language == 'go'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: '1.25.x'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@f6d22e4bcd0376f7cc35e8f476a3ec84f30d0e5e
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@f6d22e4bcd0376f7cc35e8f476a3ec84f30d0e5e

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@f6d22e4bcd0376f7cc35e8f476a3ec84f30d0e5e
