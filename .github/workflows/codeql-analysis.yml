name: CodeQL Security Analysis

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '30 4 * * 2'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GOTOOLCHAIN: go1.25.9+auto

jobs:
  analyze:
    name: Analyze (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ 'go', 'python' ]
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Enforce required Go toolchain mode
        run: echo "GOTOOLCHAIN=go1.25.9+auto" >> "$GITHUB_ENV"

      - name: Setup Go
        if: matrix.language == 'go'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: 'go.mod'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@0e9f55954318745b37b7933c693bc093f7336125
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@0e9f55954318745b37b7933c693bc093f7336125
        env:
          GOTOOLCHAIN: go1.25.9+auto

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@0e9f55954318745b37b7933c693bc093f7336125
