global:
  scrape_interval: 15s

scrape_configs:
  - job_name: orchestrator
    metrics_path: /metrics
    static_configs:
      - targets: ["orchestrator:9091"]

  - job_name: tpm-metrics
    metrics_path: /metrics
    static_configs:
      - targets: ["tpm-metrics:9102"]

  - job_name: node-agents
    metrics_path: /metrics
    static_configs:
      - targets: ["node-agent-1:9100", "node-agent-2:9100", "node-agent-3:9100"]

  - job_name: pyapi-exporter
    metrics_path: /metrics
    static_configs:
      - targets: ["pyapi-metrics-exporter:9104"]