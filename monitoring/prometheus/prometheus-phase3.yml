global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'global-aggregator'
    static_configs:
      - targets: ['global-aggregator:9091']

  - job_name: 'cluster-aggregators'
    static_configs:
      - targets:
          - 'cluster-agg-1:9091'
          - 'cluster-agg-2:9091'
          - 'cluster-agg-3:9091'

  - job_name: 'node-agents'
    static_configs:
      - targets:
          - 'node-agent-1:9100'
          - 'node-agent-2:9100'
          - 'node-agent-3:9100'
