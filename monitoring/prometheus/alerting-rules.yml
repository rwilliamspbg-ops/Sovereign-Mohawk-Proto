groups:
  - name: mohawk_resilience_alerts
    interval: 30s
    rules:
      - alert: MohawkByzantineResilienceThresholdBreach
        expr: min_over_time(mohawk_consensus_honest_ratio[10m]) < 0.555
        for: 5m
        labels:
          severity: critical
          domain: resilience
        annotations:
          summary: "Consensus honest ratio below Theorem 1 threshold"
          description: "Observed mohawk_consensus_honest_ratio fell below 0.555 for at least 5m."
          runbook_url: "https://github.com/rwilliamspbg-ops/Sovereign-Mohawk-Proto/blob/main/OPERATIONS_RUNBOOK.md#alert-mohawkbyzantineresiliencethresholdbreach"

      - alert: MohawkStragglerFailureRateHigh
        expr: |
          (
            sum(rate(mohawk_accelerator_ops_total{operation="gradient_submit",result="failure"}[5m]))
            /
            clamp_min(sum(rate(mohawk_accelerator_ops_total{operation="gradient_submit"}[5m])), 1e-9)
          ) > 0.0001
        for: 10m
        labels:
          severity: warning
          domain: liveness
        annotations:
          summary: "Straggler risk raised above 99.99% success target"
          description: "Gradient submit failure rate exceeded 0.01% over 10m, reducing theoretical liveness margin."
          runbook_url: "https://github.com/rwilliamspbg-ops/Sovereign-Mohawk-Proto/blob/main/OPERATIONS_RUNBOOK.md#alert-mohawkstragglerfailureratehigh"

      - alert: MohawkNodeAgentsDown
        expr: sum(up{job="node-agents"}) < 3
        for: 5m
        labels:
          severity: warning
          domain: liveness
        annotations:
          summary: "One or more node agents are down"
          description: "The node-agent job reports fewer than 3 healthy instances for at least 5m."
          runbook_url: "https://github.com/rwilliamspbg-ops/Sovereign-Mohawk-Proto/blob/main/OPERATIONS_RUNBOOK.md#alert-mohawknodeagentsdown"

      - alert: MohawkTPMAttestationFailuresPresent
        expr: increase(mohawk_tpm_verifications_total{result="failure"}[10m]) > 0
        for: 2m
        labels:
          severity: critical
          domain: attestation
        annotations:
          summary: "TPM attestation failures detected"
          description: "At least one TPM verification failure occurred in the last 10m."
          runbook_url: "https://github.com/rwilliamspbg-ops/Sovereign-Mohawk-Proto/blob/main/OPERATIONS_RUNBOOK.md#alert-mohawktpmattestationfailurespresent"

      - alert: MohawkTPMFailureRatioHigh
        expr: |
          (
            sum(rate(mohawk_tpm_verifications_total{result="failure"}[10m]))
            /
            clamp_min(sum(rate(mohawk_tpm_verifications_total[10m])), 1e-9)
          ) > 0.01
        for: 10m
        labels:
          severity: critical
          domain: attestation
        annotations:
          summary: "TPM verification failure ratio is high"
          description: "TPM verification failures exceed 1% over 10m."
          runbook_url: "https://github.com/rwilliamspbg-ops/Sovereign-Mohawk-Proto/blob/main/OPERATIONS_RUNBOOK.md#alert-mohawktpmfailureratiohigh"

      - alert: MohawkMigrationFailureBudgetBurnFast
        expr: |
          (
            sum(rate(mohawk_migration_requests_total{result="failure"}[5m]))
            /
            clamp_min(sum(rate(mohawk_migration_requests_total[5m])), 1e-9)
          ) > 0.05
          and
          sum(rate(mohawk_migration_requests_total[5m])) > 0.1
        for: 5m
        labels:
          severity: critical
          domain: migration
        annotations:
          summary: "Migration error budget burn rate is high (fast window)"
          description: "Migration request failure ratio exceeded 5% in the last 5m under active traffic."
          runbook_url: "https://github.com/rwilliamspbg-ops/Sovereign-Mohawk-Proto/blob/main/OPERATIONS_RUNBOOK.md"

      - alert: MohawkMigrationFailureBudgetBurnSlow
        expr: |
          (
            sum(rate(mohawk_migration_requests_total{result="failure"}[1h]))
            /
            clamp_min(sum(rate(mohawk_migration_requests_total[1h])), 1e-9)
          ) > 0.02
          and
          sum(rate(mohawk_migration_requests_total[1h])) > 0.05
        for: 15m
        labels:
          severity: warning
          domain: migration
        annotations:
          summary: "Migration error budget burn rate is elevated (slow window)"
          description: "Migration request failure ratio exceeded 2% over the last hour under active traffic."
          runbook_url: "https://github.com/rwilliamspbg-ops/Sovereign-Mohawk-Proto/blob/main/OPERATIONS_RUNBOOK.md"

      - alert: MohawkMigrationDualCryptoAdoptionStalled
        expr: |
          (
            sum(rate(mohawk_migration_signature_path_total{path="dual_crypto"}[30m]))
            /
            clamp_min(sum(rate(mohawk_migration_signature_path_total[30m])), 1e-9)
          ) < 0.80
          and
          sum(rate(mohawk_migration_requests_total[30m])) > 0.05
        for: 30m
        labels:
          severity: warning
          domain: migration
        annotations:
          summary: "Dual-crypto migration adoption is stalled"
          description: "Dual-crypto signature path share stayed below 80% for 30m while migration traffic remained active."
          runbook_url: "https://github.com/rwilliamspbg-ops/Sovereign-Mohawk-Proto/blob/main/OPERATIONS_RUNBOOK.md#quantum-migration-cutover-dual-signature"

      - alert: MohawkMigrationLegacyPathRegression
        expr: |
          (
            sum(rate(mohawk_migration_signature_path_total{path="legacy_controls"}[15m]))
            /
            clamp_min(sum(rate(mohawk_migration_signature_path_total[15m])), 1e-9)
          ) > 0.20
          and
          sum(rate(mohawk_migration_requests_total[15m])) > 0.05
        for: 15m
        labels:
          severity: critical
          domain: migration
        annotations:
          summary: "Legacy migration path share regressed"
          description: "Legacy_controls path exceeded 20% share for 15m under active migration traffic."
          runbook_url: "https://github.com/rwilliamspbg-ops/Sovereign-Mohawk-Proto/blob/main/OPERATIONS_RUNBOOK.md#quantum-migration-cutover-dual-signature"

      - alert: MohawkAuthzDenialsSpike
        expr: sum(rate(mohawk_authz_denials_total[10m])) > 0.2
        for: 10m
        labels:
          severity: warning
          domain: security
        annotations:
          summary: "Authorization denials are spiking"
          description: "Sustained authorization denials detected for protected control-plane endpoints."
          runbook_url: "https://github.com/rwilliamspbg-ops/Sovereign-Mohawk-Proto/blob/main/OPERATIONS_RUNBOOK.md"

      - alert: MohawkHumanOversightAuthorizationDenied
        expr: increase(mohawk_authz_denials_total[15m]) > 0
        for: 5m
        labels:
          severity: warning
          domain: oversight
        annotations:
          summary: "Human oversight action required: authorization denial observed"
          description: "One or more protected operations were denied in the last 15m. Operator review/approval or escalation may be required."
          runbook_url: "https://github.com/rwilliamspbg-ops/Sovereign-Mohawk-Proto/blob/main/OPERATIONS_RUNBOOK.md"

      - alert: MohawkHumanOversightMigrationFailures
        expr: increase(mohawk_migration_requests_total{result="failure"}[15m]) > 0
        for: 5m
        labels:
          severity: warning
          domain: oversight
        annotations:
          summary: "Human oversight action required: migration failures detected"
          description: "Migration request failures were observed in the last 15m. Validate approval path, policy mode, and rollback criteria."
          runbook_url: "https://github.com/rwilliamspbg-ops/Sovereign-Mohawk-Proto/blob/main/OPERATIONS_RUNBOOK.md"

      - alert: MohawkPQCPolicyDrift
        expr: mohawk:pqc_policy_enforced:min < 1
        for: 2m
        labels:
          severity: critical
          domain: pqc
        annotations:
          summary: "One or more critical PQC enforcement controls are disabled"
          description: "PQC policy enforcement is below required baseline for migration or crypto cutover controls."
          runbook_url: "https://github.com/rwilliamspbg-ops/Sovereign-Mohawk-Proto/blob/main/OPERATIONS_RUNBOOK.md"

      - alert: MohawkAggregationLatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(mohawk_accelerator_op_duration_seconds_bucket{operation="aggregate"}[10m])) by (le)
          ) > 0.25
        for: 5m
        labels:
          severity: warning
          domain: performance
        annotations:
          summary: "Aggregation latency p95 is above threshold"
          description: "The 10m aggregation p95 exceeded 250ms for at least 5m."
          runbook_url: "https://github.com/rwilliamspbg-ops/Sovereign-Mohawk-Proto/blob/main/OPERATIONS_RUNBOOK.md"

      - alert: MohawkMaliciousNodeRatioHigh
        expr: (1 - min_over_time(mohawk_consensus_honest_ratio[10m])) > 0.45
        for: 5m
        labels:
          severity: critical
          domain: resilience
        annotations:
          summary: "Malicious node ratio above safe envelope"
          description: "Estimated malicious ratio crossed 45% in the last 10m and is approaching beyond-theorem ranges."
          runbook_url: "https://github.com/rwilliamspbg-ops/Sovereign-Mohawk-Proto/blob/main/OPERATIONS_RUNBOOK.md#alert-mohawkbyzantineresiliencethresholdbreach"

      - alert: MohawkRouterRejectedRequestsHigh
        expr: mohawk:router_requests:failure_rate_5m > 0.05
        for: 10m
        labels:
          severity: warning
          domain: router
        annotations:
          summary: "Cross-vertical router rejection rate is elevated"
          description: "Router request failure ratio exceeded 5% for 10m, indicating policy mismatch or malformed request pressure."
          runbook_url: "https://github.com/rwilliamspbg-ops/Sovereign-Mohawk-Proto/blob/main/docs/CROSS_VERTICAL_FEDERATED_ROUTER.md"

      - alert: MohawkRouterBlockedRouteSpike
        expr: increase(mohawk_router_requests_total{reason="route_blocked"}[10m]) > 20
        for: 5m
        labels:
          severity: warning
          domain: router
        annotations:
          summary: "Blocked cross-vertical route attempts spiking"
          description: "More than 20 blocked route attempts were observed in 10m. Review policy-bypass attack indicators and route ACLs."
          runbook_url: "https://github.com/rwilliamspbg-ops/Sovereign-Mohawk-Proto/blob/main/docs/CROSS_VERTICAL_FEDERATED_ROUTER.md"

      - alert: MohawkRouterProofVerificationFailuresPresent
        expr: increase(mohawk_router_requests_total{reason="proof_verification"}[15m]) > 0
        for: 5m
        labels:
          severity: critical
          domain: router
        annotations:
          summary: "Router proof verification failures detected"
          description: "At least one publish operation failed proof verification in the last 15m; investigate replay/tampering risk immediately."
          runbook_url: "https://github.com/rwilliamspbg-ops/Sovereign-Mohawk-Proto/blob/main/docs/CROSS_VERTICAL_FEDERATED_ROUTER.md"
