groups:
  - name: mohawk_v2_rates
    interval: 15s
    rules:
      - record: mohawk:bridge_transfers:rate1m
        expr: sum(rate(mohawk_bridge_transfers_total[1m]))
      - record: mohawk:proof_verifications:rate1m
        expr: sum(rate(mohawk_proof_verifications_total[1m]))
      - record: mohawk:hybrid_proof_verifications:rate1m
        expr: sum(rate(mohawk_proof_verifications_total{scheme="hybrid"}[1m]))
      - record: mohawk:accelerator_ops:rate1m
        expr: sum(rate(mohawk_accelerator_ops_total[1m]))
      - record: mohawk:gradient_submit:rate1m
        expr: sum(rate(mohawk_accelerator_ops_total{operation="gradient_submit"}[1m]))
      - record: mohawk:gradient_submit:success_rate_5m
        expr: |
          sum(rate(mohawk_accelerator_ops_total{operation="gradient_submit",result="success"}[5m]))
          /
          clamp_min(sum(rate(mohawk_accelerator_ops_total{operation="gradient_submit"}[5m])), 1e-9)
      - record: mohawk:gradient_submit:failure_rate_5m
        expr: |
          sum(rate(mohawk_accelerator_ops_total{operation="gradient_submit",result="failure"}[5m]))
          /
          clamp_min(sum(rate(mohawk_accelerator_ops_total{operation="gradient_submit"}[5m])), 1e-9)
      - record: mohawk:migration_requests:rate1m
        expr: sum(rate(mohawk_migration_requests_total[1m]))
      - record: mohawk:migration_requests:failure_rate_5m
        expr: |
          sum(rate(mohawk_migration_requests_total{result="failure"}[5m]))
          /
          clamp_min(sum(rate(mohawk_migration_requests_total[5m])), 1e-9)
      - record: mohawk:authz_denials:rate5m
        expr: sum(rate(mohawk_authz_denials_total[5m]))
      - record: mohawk:migration_signature_path:rate1m
        expr: sum by (path) (rate(mohawk_migration_signature_path_total[1m]))
      - record: mohawk:router_requests:rate1m
        expr: sum(rate(mohawk_router_requests_total[1m]))
      - record: mohawk:router_requests:failure_rate_5m
        expr: |
          sum(rate(mohawk_router_requests_total{result="failure"}[5m]))
          /
          clamp_min(sum(rate(mohawk_router_requests_total[5m])), 1e-9)
      - record: mohawk:router_blocked_routes:rate5m
        expr: sum(rate(mohawk_router_requests_total{reason="route_blocked"}[5m]))
      - record: mohawk:router_proof_failures:rate5m
        expr: sum(rate(mohawk_router_requests_total{reason="proof_verification"}[5m]))

  - name: mohawk_v2_latency_quantiles
    interval: 30s
    rules:
      - record: mohawk:proof_latency_ms:p50
        expr: histogram_quantile(0.50, sum by (le) (rate(mohawk_proof_verification_latency_ms_bucket[5m])))
      - record: mohawk:proof_latency_ms:p95
        expr: histogram_quantile(0.95, sum by (le) (rate(mohawk_proof_verification_latency_ms_bucket[5m])))
      - record: mohawk:proof_latency_ms:p99
        expr: histogram_quantile(0.99, sum by (le) (rate(mohawk_proof_verification_latency_ms_bucket[5m])))
      - record: mohawk:bridge_latency_ms:p50
        expr: histogram_quantile(0.50, sum by (le) (rate(mohawk_bridge_transfer_latency_ms_bucket[5m])))
      - record: mohawk:bridge_latency_ms:p95
        expr: histogram_quantile(0.95, sum by (le) (rate(mohawk_bridge_transfer_latency_ms_bucket[5m])))
      - record: mohawk:bridge_latency_ms:p99
        expr: histogram_quantile(0.99, sum by (le) (rate(mohawk_bridge_transfer_latency_ms_bucket[5m])))

  - name: mohawk_v2_availability
    interval: 15s
    rules:
      - record: mohawk:services_up:count
        expr: sum(up{job=~"orchestrator|tpm-metrics|node-agents|pyapi-exporter|federated-router"})
      - record: mohawk:node_agents_up:count
        expr: sum(up{job="node-agents"})
      - record: mohawk:orchestrator_up
        expr: max(up{job="orchestrator"})
      - record: mohawk:router_up
        expr: max(up{job="federated-router"})

  - name: mohawk_v2_compliance
    interval: 30s
    rules:
      - record: mohawk:pqc_policy_enforced:min
        expr: min(mohawk_pqc_policy_enabled{policy=~"migration_enabled|migration_lock_legacy_transfers|require_crypto_after_epoch"})
      - record: mohawk:thinker_clause:manual_review_threshold
        expr: max(mohawk_thinker_clause_config{setting="manual_review_required_above_zscore"})
      - record: mohawk:migration_latency_ms:p95
        expr: histogram_quantile(0.95, sum by (le) (rate(mohawk_migration_request_latency_ms_bucket[5m])))
